<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pegasus — Moon Lander</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#14141e">
  <!-- iOS home screen support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pegasus">
  <link rel="apple-touch-icon" href="./icon-180.png">
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #14141e; }
    canvas { display: block; width: 100vw; height: 100vh; }

    /* The attitude stick is drawn IN-CANVAS by the game now (macroquad touch
       API); no DOM element. touch-action:none on the canvas stops iOS
       scroll/zoom gestures from hijacking flight touches. */
    canvas { touch-action: none; }

    /* Info button — top-right corner, clear of the notch */
    #info-btn {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      right: calc(env(safe-area-inset-right) + 12px);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(40, 60, 100, 0.55);
      border: 1.5px solid rgba(180, 210, 255, 0.7);
      color: rgba(220, 235, 255, 0.95);
      font: italic 700 24px/40px Georgia, "Times New Roman", serif;
      text-align: center;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: all;
      touch-action: manipulation;
      z-index: 10;
    }
    #info-btn:hover { background: rgba(80, 140, 220, 0.7); }

    /* Fullscreen info overlay */
    #info-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 16, 30, 0.92);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: max(env(safe-area-inset-top), 24px) 24px max(env(safe-area-inset-bottom), 24px);
      color: #dde9ff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      z-index: 20;
      pointer-events: all;
    }
    #info-overlay.open { display: flex; }
    #info-overlay h1 {
      font-size: clamp(28px, 6vw, 48px);
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    #info-overlay .info-row { font-size: clamp(16px, 3.5vw, 24px); }
    #info-overlay .info-label {
      color: #8ba8d6;
      margin-bottom: 6px;
    }
    #info-overlay .info-value {
      font-family: "SF Mono", "Menlo", "Consolas", monospace;
      font-size: clamp(20px, 5vw, 34px);
      color: #ffffff;
    }
    #info-close {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 12px);
      right: calc(env(safe-area-inset-right) + 12px);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1.5px solid rgba(255, 255, 255, 0.4);
      color: #dde9ff;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 700 22px/1 sans-serif;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    #info-overlay .info-hint {
      font-size: 14px;
      color: #6c84ad;
      margin-top: 8px;
    }
    /* Settings rows: velocity-vector arrow + invert-stick toggle */
    #vel-toggle-row,
    #inv-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: clamp(16px, 3.5vw, 22px);
      color: #dde9ff;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    #vel-toggle-row input,
    #inv-toggle-row input {
      width: 20px;
      height: 20px;
      accent-color: #6ec1ff;
      cursor: pointer;
    }

    /* Manual cache-bypass reload — same ?fresh= mechanism as the toast, for
       when you want the newest build without waiting for detection. */
    #force-reload {
      margin-top: 12px;
      padding: 12px 24px;
      border: 1.5px solid rgba(140, 200, 255, 0.8);
      border-radius: 24px;
      background: rgba(24, 40, 72, 0.6);
      color: #dde9ff;
      font: 600 16px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    #force-reload:hover { background: rgba(60, 110, 190, 0.6); }

    /* "New build available" toast — GitHub Pages caches index.html for
       ~10 min, so a fresh deploy can serve a stale page; version.json is
       fetched with the cache bypassed and a mismatch shows this. */
    #update-toast {
      position: fixed;
      top: calc(env(safe-area-inset-top) + 64px);
      left: 50%;
      transform: translateX(-50%) translateY(-16px);
      background: rgba(24, 40, 72, 0.95);
      border: 1.5px solid rgba(140, 200, 255, 0.8);
      border-radius: 24px;
      color: #dde9ff;
      font: 600 15px/1.2 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 12px 20px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      pointer-events: all;
      z-index: 30;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
    }
    #update-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <canvas id="glcanvas" tabindex="1"></canvas>

  <!-- Probe elements to read the safe-area insets in CSS pixels (all four sides) -->
  <div id="safe-area-probe" style="position:fixed;top:0;left:0;height:env(safe-area-inset-top);width:env(safe-area-inset-left);pointer-events:none;"></div>
  <div id="safe-area-probe-br" style="position:fixed;bottom:0;right:0;height:env(safe-area-inset-bottom);width:env(safe-area-inset-right);pointer-events:none;"></div>

  <!-- Info button + fullscreen overlay -->
  <div id="info-btn" role="button" aria-label="Info" title="Info">i</div>
  <div id="info-overlay" role="dialog" aria-modal="true">
    <div id="info-close" role="button" aria-label="Close">&times;</div>
    <h1>Pegasus — Moon Lander</h1>
    <div class="info-row">
      <div class="info-label">Build revision</div>
      <div class="info-value" id="git-rev">b73ec81-pr-70</div>
    </div>
    <div class="info-row">
      <div class="info-label">Build time</div>
      <div class="info-value" id="build-time">2026-07-08 21:41 UTC</div>
    </div>
    <label id="vel-toggle-row">
      <input type="checkbox" id="vel-toggle">
      Velocity vector
    </label>
    <label id="inv-toggle-row">
      <input type="checkbox" id="inv-toggle">
      Invert stick
    </label>
    <div id="force-reload" role="button">&#10227; Reload latest build</div>
    <div class="info-hint">Tap anywhere to close</div>
  </div>

  <!-- Stale-cache reload toast (hidden until a newer version.json is seen) -->
  <div id="update-toast" role="button">⟳ New build available — tap to reload</div>

  <!-- DEBUG (replay-drift investigation): download the last run's recording -->
  <div id="dl-replay" role="button" style="position:fixed;left:calc(env(safe-area-inset-left) + 12px);bottom:calc(env(safe-area-inset-bottom) + 12px);z-index:20;padding:8px 12px;border-radius:8px;background:rgba(40,50,70,0.85);color:#cdd;border:1px solid rgba(190,200,218,0.6);font:600 13px -apple-system,sans-serif;display:none;">⬇︎ replay</div>


  <script>
    // Boot guard — deliberately in its OWN <script> tag: script tags parse
    // independently, so a SyntaxError in the bundle or the main inline
    // script below cannot kill this one (that failure mode shipped once:
    // a redeclared bundle global silently killed the whole main script and
    // the page showed only HTML chrome with no error anywhere). Shows any
    // script error on screen and offers a cache-bypass reload if the wasm
    // hasn't started.
    (function () {
      var box = null;
      function show(msg) {
        if (!box) {
          box = document.createElement("div");
          box.style.cssText = "position:fixed;left:12px;right:12px;bottom:12px;" +
            "z-index:99;background:rgba(130,25,25,0.93);color:#fff;" +
            "font:13px/1.45 -apple-system,BlinkMacSystemFont,sans-serif;" +
            "padding:10px 14px;border-radius:10px;white-space:pre-wrap;";
          box.addEventListener("click", function () {
            location.replace(location.pathname + "?fresh=" + Date.now());
          });
          document.body.appendChild(box);
        }
        box.textContent = msg + "\n(tap here to reload the latest build)";
      }
      // Rust panics print their message + location via console.error just
      // before the wasm traps, but the error event that follows is muted to a
      // bare "Script error." (no file/line) on iOS Safari — wasm frames fail
      // its same-origin check. Mirror the last console.error so the banner
      // can show the real panic instead. Installed here (before the bundle
      // loads) so the bundle's console_error import routes through it.
      var lastConsoleError = "";
      var origConsoleError = console.error;
      console.error = function () {
        try {
          lastConsoleError =
            Array.prototype.map.call(arguments, String).join(" ").slice(0, 300);
        } catch (_) { /* never let logging break the logger */ }
        return origConsoleError.apply(console, arguments);
      };
      window.addEventListener("error", function (e) {
        // Fully-anonymous error (no filename) with no console.error trace:
        // cannot be ours. Same-origin scripts always report file:line, and a
        // wasm panic always logs through the panic hook first. What does land
        // here is Safari-injected third-party JS — reproduced live: opening
        // the iOS share sheet runs share/action extensions' preprocessing
        // scripts in the page, and any error they throw arrives as a muted
        // "Script error." Don't paint the banner over that noise.
        if (!e.filename && !lastConsoleError) return;
        var msg = "Script error: " + (e.message || "unknown") +
          (e.filename ? "\n" + e.filename.split("/").pop() + ":" + e.lineno : "");
        // Anonymous or wasm-trap error: iOS Safari mutes wasm errors to a
        // bare "Script error." (no filename); Chrome attributes them to the
        // .wasm URL but the message is just "unreachable". Either way the
        // last console.error (the panic hook's output) is the real cause.
        if ((!e.filename || /\.wasm(\?|$)/.test(e.filename)) && lastConsoleError) {
          msg += "\n" + lastConsoleError;
        }
        show(msg);
      });
      window.addEventListener("unhandledrejection", function (e) {
        if (e.reason == null) return; // contentless → same third-party noise rule
        show("Unhandled promise rejection: " + String(e.reason).slice(0, 300));
      });
      setTimeout(function () {
        if (typeof wasm_exports === "undefined" || !wasm_exports) {
          show("Game failed to start (wasm not running after 8 s).");
        }
      }, 8000);
    })();
  </script>
  <script src="./mq_js_bundle.js"></script>
  <script>
    function call(name, ...args) {
      if (typeof wasm_exports !== "undefined" && wasm_exports[name]) {
        wasm_exports[name](...args);
      }
    }

    // --- Attitude stick + main engine ---
    // The floating attitude stick is drawn and read IN-CANVAS by the game
    // (macroquad touch API, mouse-synthesis disabled). No DOM stick, no
    // document touch handlers, no JET button — holding the stick lights the
    // engine. The only touch setting still forwarded from here is Invert
    // stick (set_invert_stick export, wired below).

    // --- Bluetooth / USB game controller (Web Gamepad API) ---
    // A controller paired with the device shows up in navigator.getGamepads().
    // We poll it each animation frame and forward to dedicated WASM exports
    // (set_pad_*), which are combined with touch/keyboard inside the game.
    //   Thrust   : A / Cross (0), R2 trigger (7), or D-pad up (12)
    //   Steer    : left stick X (axes[0], dead-zoned) or D-pad left/right (14/15)
    //   Reset    : Start (9) or Y / Triangle (3)
    // Standard mapping is assumed (the common layout for BT pads in browsers).
    const STICK_DEADZONE = 0.18;
    let padPolling = false;
    let prevResetPressed = false;

    function firstGamepad() {
      const pads = navigator.getGamepads ? navigator.getGamepads() : [];
      for (const p of pads) if (p) return p;
      return null;
    }

    function pollGamepad() {
      const pad = firstGamepad();
      if (!pad) {
        // Controller dropped out — release any held inputs and stop polling.
        call("set_pad_thrust", 0);
        call("set_pad_torque", 0);
        prevResetPressed = false;
        padPolling = false;
        return;
      }

      const btn = i => pad.buttons[i] && pad.buttons[i].pressed;
      const val = i => (pad.buttons[i] ? pad.buttons[i].value : 0);

      // Thrust: A button, R2 trigger (analog → treat >0.3 as on), or D-pad up.
      const thrust = (btn(0) || val(7) > 0.3 || btn(12)) ? 1 : 0;
      call("set_pad_thrust", thrust);

      // Steering: analog left stick with a dead-zone, rescaled so it still
      // reaches ±1 past the dead-zone. D-pad overrides to full deflection.
      let x = pad.axes[0] || 0;
      if (Math.abs(x) < STICK_DEADZONE) {
        x = 0;
      } else {
        x = (x - Math.sign(x) * STICK_DEADZONE) / (1 - STICK_DEADZONE);
      }
      if (btn(14)) x = -1;
      else if (btn(15)) x = 1;
      call("set_pad_torque", Math.max(-1, Math.min(1, x)));

      // Reset: edge-triggered so a held button fires once.
      const resetPressed = btn(9) || btn(3);
      if (resetPressed && !prevResetPressed) call("set_pad_reset");
      prevResetPressed = resetPressed;

      requestAnimationFrame(pollGamepad);
    }

    function startPadPolling() {
      if (padPolling) return;
      padPolling = true;
      requestAnimationFrame(pollGamepad);
    }

    window.addEventListener("gamepadconnected", startPadPolling);
    // Some browsers report an already-connected pad without firing the event
    // (e.g. after a reload), so probe once the WASM exports are ready too.
    if (firstGamepad()) startPadPolling();

    // Report the safe-area insets (all four sides) to the game, in CSS px.
    // The canvas is 100vh, so it extends UNDER the floating browser toolbar;
    // env(safe-area-inset-bottom) only covers the home indicator, so the
    // bottom inset also folds in the toolbar height measured via
    // visualViewport (window height minus the actually-visible height).
    const safeProbe = document.getElementById("safe-area-probe");
    const safeProbeBR = document.getElementById("safe-area-probe-br");
    function reportSafeArea() {
      const tl = safeProbe.getBoundingClientRect();
      const br = safeProbeBR.getBoundingClientRect();
      const vv = window.visualViewport;
      // The canvas is 100vh = the LARGE viewport (toolbar retracted); vh units
      // don't shrink when the toolbar shows. visualViewport.height is the
      // ACTUALLY visible height. Their difference is what the floating toolbar
      // + home indicator hide at the bottom. (window.innerHeight is unreliable
      // here — it often already equals visualViewport.height.)
      let obscuredBottom = 0;
      if (vv) {
        const canvas = document.getElementById("glcanvas");
        const ch = canvas ? canvas.getBoundingClientRect().height : window.innerHeight;
        obscuredBottom = Math.max(0, Math.round(ch - vv.height - vv.offsetTop));
      }
      const bottom = Math.max(br.height, obscuredBottom);
      call("set_safe_area", tl.height, tl.width, bottom, br.width);
    }
    window.addEventListener("resize", reportSafeArea);
    window.addEventListener("orientationchange", () => setTimeout(reportSafeArea, 300));
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", reportSafeArea);
      window.visualViewport.addEventListener("scroll", reportSafeArea);
    }
    // The WASM exports aren't ready immediately; poll briefly until it loads.
    const safeAreaTimer = setInterval(() => {
      if (typeof wasm_exports !== "undefined" && wasm_exports.set_safe_area) {
        reportSafeArea();
        clearInterval(safeAreaTimer);
      }
    }, 200);

    // Info overlay toggle. Stop propagation so taps on the button/overlay
    // don't reach the canvas (which would fire the thruster).
    const infoBtn = document.getElementById("info-btn");
    const infoOverlay = document.getElementById("info-overlay");
    const infoClose = document.getElementById("info-close");
    const gitRev = document.getElementById("git-rev");
    const buildTime = document.getElementById("build-time");

    // If the deploy-time placeholders weren't substituted (e.g. opened locally),
    // show a friendly fallback instead of the raw token.
    // sed replaces the placeholders everywhere including in string literals,
    // so compare with startsWith("__") rather than a literal match.
    if (gitRev.textContent.trim().startsWith("__")) {
      gitRev.textContent = "dev (local build)";
    }
    if (buildTime.textContent.trim().startsWith("__")) {
      buildTime.textContent = "dev (local build)";
    }

    function openInfo(e) {
      e.preventDefault();
      e.stopPropagation();
      infoOverlay.classList.add("open");
    }
    function closeInfo(e) {
      if (e) { e.preventDefault(); e.stopPropagation(); }
      infoOverlay.classList.remove("open");
    }
    // Swallow mousedown so it never reaches the canvas/window listener that
    // fires the thruster on desktop (mousedown precedes click).
    const swallow = e => e.stopPropagation();
    infoBtn.addEventListener("mousedown", swallow);
    infoOverlay.addEventListener("mousedown", swallow);

    infoBtn.addEventListener("click", openInfo);
    infoBtn.addEventListener("touchstart", openInfo, { passive: false });
    infoOverlay.addEventListener("click", closeInfo);
    infoOverlay.addEventListener("touchstart", closeInfo, { passive: false });
    infoClose.addEventListener("click", closeInfo);

    // Cache-bust the wasm with the deploy revision so a fresh deploy never
    // serves a stale binary from the browser/CDN cache. Locally the
    // placeholder is untouched (sed only runs at deploy) → plain URL.
    const wasmRev = "b73ec81-pr-70";
    load("./pegasus.wasm" + (wasmRev.startsWith("__") ? "" : "?v=" + wasmRev));

    // Stamp the deploy revision into the game (first 8 hex chars of the git
    // hash → u32) so serialized replay blobs record which build flew them.
    // 0 = local dev build. Exports aren't ready immediately; retry like the
    // velocity-toggle probe below.
    const buildId = wasmRev.startsWith("__")
      ? 0
      : (parseInt(wasmRev.slice(0, 8), 16) || 0) >>> 0;
    const buildIdTimer = setInterval(() => {
      if (typeof wasm_exports !== "undefined" && wasm_exports.set_build_id) {
        wasm_exports.set_build_id(buildId);
        clearInterval(buildIdTimer);
      }
    }, 200);

    // --- Stale-cache detection ---
    // GitHub Pages caches index.html for ~10 minutes, so right after a deploy
    // this page (and the ?v= it carries) can be the PREVIOUS build. Compare
    // the baked-in revision against version.json fetched with the cache
    // bypassed; on mismatch show a reload toast. Reloading navigates to a
    // ?fresh=<ts> URL, which skips the cached HTML entirely.
    const updateToast = document.getElementById("update-toast");
    let lastVersionCheck = 0;

    // Navigate to a ?fresh=<ts> URL: a unique query string bypasses the
    // cached copy of index.html (a plain reload would re-serve it).
    function freshReload() {
      location.replace(location.pathname + "?fresh=" + Date.now());
    }

    function checkVersion() {
      if (wasmRev.startsWith("__")) return;          // local dev: no version.json
      const now = Date.now();
      if (now - lastVersionCheck < 30000) return;    // throttle
      lastVersionCheck = now;
      fetch("./version.json?nocache=" + now, { cache: "no-store" })
        .then(r => (r.ok ? r.json() : null))
        .then(v => {
          if (v && v.revision && v.revision !== wasmRev) {
            updateToast.classList.add("show");
          }
        })
        .catch(() => {});                            // offline / pre-toast deploys: ignore
    }

    updateToast.addEventListener("mousedown", e => e.stopPropagation());
    updateToast.addEventListener("click", e => {
      e.stopPropagation();
      freshReload();
    });
    updateToast.addEventListener("touchstart", e => {
      e.preventDefault();
      e.stopPropagation();
      freshReload();
    }, { passive: false });

    // Velocity-vector toggle: forwarded to the game, persisted per device.
    // stopPropagation (but no preventDefault — that would kill the checkbox's
    // click) so tapping the row doesn't close the overlay.
    const velToggle = document.getElementById("vel-toggle");
    const velRow = document.getElementById("vel-toggle-row");
    velToggle.checked = localStorage.getItem("pegasus_show_vel") === "1";
    function applyVelSetting() {
      call("set_show_velocity", velToggle.checked ? 1 : 0);
    }
    velToggle.addEventListener("change", () => {
      localStorage.setItem("pegasus_show_vel", velToggle.checked ? "1" : "0");
      applyVelSetting();
    });
    ["mousedown", "click", "touchstart"].forEach(ev =>
      velRow.addEventListener(ev, e => e.stopPropagation()));
    // The WASM exports aren't ready immediately; apply the saved value once
    // they are (same pattern as the safe-area probe).
    const velTimer = setInterval(() => {
      if (typeof wasm_exports !== "undefined" && wasm_exports.set_show_velocity) {
        applyVelSetting();
        clearInterval(velTimer);
      }
    }, 200);

    // Invert-stick toggle: negates the commanded nose direction in-game
    // (push down = nose up). Forwarded to the WASM `set_invert_stick` export
    // and persisted per device; re-applied once the exports load (same
    // pattern as the velocity toggle).
    const invToggle = document.getElementById("inv-toggle");
    const invRow = document.getElementById("inv-toggle-row");
    invToggle.checked = localStorage.getItem("pegasus_invert_stick") === "1";
    function applyInvSetting() {
      call("set_invert_stick", invToggle.checked ? 1 : 0);
    }
    invToggle.addEventListener("change", () => {
      localStorage.setItem("pegasus_invert_stick", invToggle.checked ? "1" : "0");
      applyInvSetting();
    });
    ["mousedown", "click", "touchstart"].forEach(ev =>
      invRow.addEventListener(ev, e => e.stopPropagation()));
    const invTimer = setInterval(() => {
      if (typeof wasm_exports !== "undefined" && wasm_exports.set_invert_stick) {
        applyInvSetting();
        clearInterval(invTimer);
      }
    }, 200);

    // DEBUG (replay-drift investigation): show the download button once a run
    // has crashed (a recording blob is available), and download it on tap.
    const dlReplay = document.getElementById("dl-replay");
    function downloadReplay() {
      if (typeof wasm_exports === "undefined" || !wasm_exports.replay_blob_len) return;
      const len = wasm_exports.replay_blob_len();
      if (!len) return;
      const ptr = wasm_exports.replay_blob_ptr();
      const bytes = new Uint8Array(wasm_memory.buffer, ptr, len).slice();
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([bytes], { type: "application/octet-stream" }));
      a.download = "pegasus-replay.bin";
      document.body.appendChild(a);
      a.click();
      a.remove();
    }
    ["click", "touchend"].forEach(ev => dlReplay.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation(); downloadReplay();
    }, { passive: false }));
    setInterval(() => {
      if (typeof wasm_exports !== "undefined" && wasm_exports.replay_blob_len) {
        dlReplay.style.display = wasm_exports.replay_blob_len() > 0 ? "" : "none";
      }
    }, 500);

    // Manual reload button in the info overlay (stopPropagation so the tap
    // doesn't just close the overlay).
    const forceReload = document.getElementById("force-reload");
    forceReload.addEventListener("mousedown", e => e.stopPropagation());
    forceReload.addEventListener("click", e => {
      e.stopPropagation();
      freshReload();
    });
    forceReload.addEventListener("touchstart", e => {
      e.preventDefault();
      e.stopPropagation();
      freshReload();
    }, { passive: false });

    // Trigger the check on load, then on every plausible "came back to this
    // page" signal AND on a slow interval — visibilitychange alone never
    // fires in an iOS in-app webview that simply stays open, which is
    // exactly where a stale page lingers longest. The 30 s throttle in
    // checkVersion keeps the overlapping triggers cheap.
    checkVersion();
    setInterval(checkVersion, 60000);
    window.addEventListener("focus", checkVersion);
    window.addEventListener("pageshow", checkVersion);
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible") checkVersion();
    });
  </script>
