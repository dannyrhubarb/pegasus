name: CI

# Deploy only runs on pushes to main, so without this a broken build is first
# discovered after merge — when it blocks the deploy. Check PRs instead.
on:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the whats-new check sees commit trailers

      # Deploy-time site generation that would otherwise first break on
      # main: the What's New data must generate and be valid JSON.
      - name: Check whats-new generation
        run: python3 tools/gen-whats-new.py | python3 -m json.tool > /dev/null

      - name: Install Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check wasm target (what actually deploys)
        run: cargo check --target wasm32-unknown-unknown

      # --workspace: the sim-core crate (pegasus-sim) carries its own tests
      # and a plain `cargo test` in a workspace root only runs the root
      # package's.
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace
