# Android build check: assembles the bundle and builds a DEBUG apk on every
# PR touching the Android shell — the twin of ios-build.yml. The debug APK
# is attached as an artifact, so every PR also produces a directly
# installable build (enable "install unknown apps" on the device).
name: Android build check

on:
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: gen-whats-new.py degrades to backfill-only on a
          # shallow clone (same rule as the web deploys).
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"

      - name: Install Rust
        run: |
          if ! command -v cargo >/dev/null; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          fi
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-android-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-android-

      - name: Install wasm-opt
        run: sudo apt-get install -y binaryen

      - name: Assemble webroot
        run: ./android/sync-web.sh

      - name: Build debug APK
        run: gradle -p android assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: pegasus-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
