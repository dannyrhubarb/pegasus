name: Build site
description: >
  Build the WASM release, generate icons, and assemble the deployable site into
  site/ — shared by the main deploy and the per-PR preview deploy.
inputs:
  revision:
    description: Revision label injected into the info overlay (__GIT_REVISION__).
    required: true
  backend-config:
    description: >
      JSON for site/config.json ({"apiBaseUrl": …, "replayBaseUrl": …} — the
      pegasus-backend stack's FrontendConfigJson output, stored in the
      BACKEND_CONFIG_JSON repo variable). Empty = no config.json is written
      and the game runs with online scores disabled.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Install Rust wasm target
      shell: bash
      run: rustup target add wasm32-unknown-unknown

    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-

    - name: Build WASM
      shell: bash
      run: cargo build --release --target wasm32-unknown-unknown

    - name: Generate app icons
      shell: bash
      run: |
        sudo apt-get install -y librsvg2-bin binaryen
        rsvg-convert -w 512 -h 512 icon.svg -o icon-512.png
        rsvg-convert -w 192 -h 192 icon.svg -o icon-192.png
        rsvg-convert -w 180 -h 180 icon.svg -o icon-180.png

    - name: Assemble site
      shell: bash
      env:
        GIT_REV: ${{ inputs.revision }}
        BACKEND_CONFIG: ${{ inputs.backend-config }}
      run: |
        mkdir -p site
        cp index.html site/
        cp editor.html site/
        cp manifest.json site/
        cp icon-512.png icon-192.png icon-180.png site/
        cp mq_js_bundle.js site/
        # License compliance: the GPL text + the generated third-party
        # attribution page (linked from the About screen) ship with the site.
        cp LICENSE site/
        cp third-party-licenses.html site/
        # Standalone privacy policy (linked from the Play Store listing;
        # same content as the About screen's privacy note).
        cp privacy.html site/
        # Levels are runtime data (fetched by index.html) — new levels ship
        # by editing levels/ + manifest.json, no wasm rebuild needed.
        cp -r levels site/
        # Shrink the wasm (~30% on top of the size-tuned release profile).
        wasm-opt -Oz -o site/pegasus.wasm target/wasm32-unknown-unknown/release/pegasus.wasm
        # Inject the build's git revision and timestamp into the info overlay.
        # ISO-8601 UTC: index.html re-renders it in the viewer's timezone
        # and region-derived locale (fmtDateTime), like the board timestamps.
        BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        sed -i "s|__GIT_REVISION__|${GIT_REV}|g" site/index.html
        sed -i "s|__BUILD_TIME__|${BUILD_TIME}|g" site/index.html
        # Version marker fetched with cache bypassed by index.html, to detect
        # a stale cached page and offer the "new build" reload toast.
        printf '{"revision":"%s"}\n' "${GIT_REV}" > site/version.json
        # What's New data for the About screen: curated backfill + every
        # commit carrying a `Whats-new:` trailer. Needs full git history —
        # the workflows that use this action check out with fetch-depth: 0
        # (a shallow clone silently drops every trailered commit below HEAD).
        python3 tools/gen-whats-new.py > site/whats-new.json
        # Backend endpoints (online high scores). Comes from the
        # BACKEND_CONFIG_JSON repo variable so URLs rotate without a code
        # change; validated so a malformed variable fails the build here
        # rather than silently shipping a broken config.json. Absent
        # variable = no config.json = the game runs offline-only.
        if [ -n "${BACKEND_CONFIG}" ]; then
          echo "${BACKEND_CONFIG}" | python3 -c 'import json,sys; c = json.load(sys.stdin); assert c["apiBaseUrl"].startswith("https://") and c["replayBaseUrl"].startswith("https://")'
          printf '%s\n' "${BACKEND_CONFIG}" > site/config.json
        fi
