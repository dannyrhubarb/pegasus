function starterDoc() {
  // A small flyable box room so TEST FLY works before the first stroke:
  // floor / ceiling / walls as four overlapping slabs (the Hollows frame
  // pattern), a start platform under the spawn and two pads to visit.
  return {
    name: "My Level",
    scoring: "time",
    // Ordered operation stack — NEWEST WINS: rock ops add, cut ops remove.
    // Drawing rock over a carved area fills it back in; carving through
    // that rock opens it again — layers compose like paint strokes. Every
    // op stays an editable object; compiledPolys bakes the stack into
    // plain `poly` lines at export (a cut only affects rock BELOW it).
    ops: [
      { t: "rock", p: [[-40, -9], [40, -9], [40, -2], [-40, -2]] },
      { t: "rock", p: [[-40, 13], [40, 13], [40, 20], [-40, 20]] },
      { t: "rock", p: [[-44, -9], [-38, -9], [-38, 20], [-44, 20]] },
      { t: "rock", p: [[38, -9], [44, -9], [44, 20], [38, 20]] },
    ],
    pads: [[-20, -1.8], [20, -1.8]],
    start: [0, -1.8],
    spawnY: null, // explicit spawn_y (only meaningful with no start platform)
    // Groups: elements carry a group id (ops: `g` property; pads/start: a
    // third array slot the exporter never reads) and the group's metadata
    // ({lk: locked}) lives here, keyed by id. Editor-only — rides the
    // editor-doc comment, never the game's level lines.
    groups: {},
  };
}

// Accept any historical document shape: the flat polys+holes model (and the
// polys-only one before it) becomes the equivalent op stack — all rock
// first, then all cuts, which is exactly what the old global subtraction
// meant.
function normalizeDoc(d) {
  const out = Object.assign(starterDoc(), d);
  if (!Array.isArray(out.ops) || (d && !Array.isArray(d.ops) && Array.isArray(d.polys))) {
    out.ops = (d.polys || []).map(p => ({ t: "rock", p }))
      .concat((d.holes || []).map(p => ({ t: "cut", p })));
  }
  out.ops = out.ops.filter(o => o && (o.t === "rock" || o.t === "cut") && Array.isArray(o.p));
  if (!out.groups || typeof out.groups !== "object") out.groups = {};
  delete out.polys;
  delete out.holes;
  return out;
}

// ---------- groups / lock ----------
// A member ref is {kind:'op'|'pad'|'start', idx} (op idx into doc.ops).
function hitToMember(hit) {
  if (!hit) return null;
  if (hit.kind === "poly" || hit.kind === "hole") return { kind: "op", idx: hit.idx };
  if (hit.kind === "pad") return { kind: "pad", idx: hit.idx };
  if (hit.kind === "start") return { kind: "start" };
  return null; // vert/mid handles are not group members
}
function elGroupOf(m) {
  if (m.kind === "op") return doc.ops[m.idx] && doc.ops[m.idx].g;
  if (m.kind === "pad") return doc.pads[m.idx] && doc.pads[m.idx][2];
  if (m.kind === "start") return doc.start && doc.start[2];
  return undefined;
}
function setElGroup(m, gid) {
  if (m.kind === "op" && doc.ops[m.idx]) {
    if (gid == null) delete doc.ops[m.idx].g; else doc.ops[m.idx].g = gid;
  } else if (m.kind === "pad" && doc.pads[m.idx]) {
    if (gid == null) doc.pads[m.idx].length = 2; else doc.pads[m.idx][2] = gid;
  } else if (m.kind === "start" && doc.start) {
    if (gid == null) doc.start.length = 2; else doc.start[2] = gid;
  }
}
function groupMembers(gid) {
  const out = [];
  doc.ops.forEach((o, i) => { if (o.g === gid) out.push({ kind: "op", idx: i }); });
  doc.pads.forEach((p, i) => { if (p[2] === gid) out.push({ kind: "pad", idx: i }); });
  if (doc.start && doc.start[2] === gid) out.push({ kind: "start" });
  return out;
}
function groupLocked(gid) { return !!(doc.groups[gid] || {}).lk; }
function nextGid() {
  return Object.keys(doc.groups).reduce((n, k) => Math.max(n, +k), 0) + 1;
}
function pruneGroups() {
  for (const k of Object.keys(doc.groups))
    if (!groupMembers(+k).length) delete doc.groups[k];
}

// ---------- scale & rotate (#115) ----------
// A transformable selection (single rock/cut op, or an unlocked group)
// exposes two grips hung off its bounding box: SCALE at the bottom-right
// corner, ROTATE at the top-right. Both transform about the bbox centre.
// Returns the world-space centre + the two grip corners, or null when the
// selection can't transform (locked, browse mode, pads/start alone — a
// pad has nothing to scale/rotate, its deck is fixed by the game).
const SCALE_HANDLE_OFF = 16; // px past the bbox corner
function selScaleInfo() {
  if (lockAllOn || !sel) return null;
  let pts = null;
  if (sel.kind === "poly" || sel.kind === "hole") {
    const p = opPoly(sel.idx);
    if (p && p.length) pts = p;
  } else if (sel.kind === "group" && !groupLocked(sel.gid)) {
    pts = [];
    for (const m of groupMembers(sel.gid)) {
      if (m.kind === "op") pts.push(...doc.ops[m.idx].p);
      else { const p = m.kind === "pad" ? doc.pads[m.idx] : doc.start; if (p) pts.push(p); }
    }
  }
  if (!pts || !pts.length) return null;
  let lo = [Infinity, Infinity], hi = [-Infinity, -Infinity];
  for (const p of pts) {
    lo = [Math.min(lo[0], p[0]), Math.min(lo[1], p[1])];
    hi = [Math.max(hi[0], p[0]), Math.max(hi[1], p[1])];
  }
  return { cx: (lo[0] + hi[0]) / 2, cy: (lo[1] + hi[1]) / 2,
           hx: hi[0], hy: lo[1], ty: hi[1] };
}
// Geometry snapshot for the scale gesture (same member set as drag-group).
function scaleSnapshot() {
  if (sel.kind === "group") {
    const ms = groupMembers(sel.gid);
    return {
      ops: ms.filter(m => m.kind === "op")
             .map(m => [m.idx, doc.ops[m.idx].p.map(q => [...q])]),
      pads: ms.filter(m => m.kind === "pad")
              .map(m => [m.idx, [...doc.pads[m.idx]]]),
      start: ms.some(m => m.kind === "start") ? [...doc.start] : null,
    };
  }
  return { ops: [[sel.idx, opPoly(sel.idx).map(q => [...q])]], pads: [], start: null };
}

let doc = starterDoc();
try {
  const saved = JSON.parse(localStorage.getItem(DOC_KEY) || "null");
  if (saved && (Array.isArray(saved.ops) || Array.isArray(saved.polys)))
    doc = normalizeDoc(saved);
} catch (e) { /* corrupt autosave: start fresh */ }

// ---------- view / canvas ----------
const cv = document.getElementById("cv");
const ctx = cv.getContext("2d");
// Offscreen layer for the rock fill: holes erase it via destination-out
// without wiping the grid underneath (see the rock block in draw()).
const rockLayer = document.createElement("canvas");
let view = { x: 0, y: 5, s: 8 }; // world centre + px per metre
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = window.devicePixelRatio || 1;
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  draw();
}
window.addEventListener("resize", resize);

const w2sx = wx => (wx - view.x) * view.s + W / 2;
const w2sy = wy => H / 2 - (wy - view.y) * view.s;
const s2wx = sx => (sx - W / 2) / view.s + view.x;
const s2wy = sy => (H / 2 - sy) / view.s + view.y;

function fitView() {
  let lo = [Infinity, Infinity], hi = [-Infinity, -Infinity];
  const eat = p => { lo[0] = Math.min(lo[0], p[0]); lo[1] = Math.min(lo[1], p[1]);
                     hi[0] = Math.max(hi[0], p[0]); hi[1] = Math.max(hi[1], p[1]); };
  doc.ops.forEach(o => o.p.forEach(eat));
  doc.pads.forEach(eat);
  if (doc.start) eat(doc.start);
  if (lo[0] > hi[0]) { view = { x: 0, y: 5, s: 8 }; return; }
  view.x = (lo[0] + hi[0]) / 2;
  view.y = (lo[1] + hi[1]) / 2;
  const pad = 40; // px margin
  view.s = Math.min((W - pad * 2) / Math.max(1, hi[0] - lo[0]),
                    (H - pad * 2) / Math.max(1, hi[1] - lo[1]));
  view.s = Math.max(0.8, Math.min(60, view.s));
}

// ---------- undo / autosave ----------
const undoStack = [], redoStack = [];
function pushUndo() {
  undoStack.push(JSON.stringify(doc));
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
  syncUndoBtns();
}
function commit() { // after any mutation: autosave + refresh chrome
  try { localStorage.setItem(DOC_KEY, JSON.stringify(doc)); } catch (e) {}
  refreshIssues();
  draw();
}
function undo() {
  if (!undoStack.length) return;
  cancelDraw();
  redoStack.push(JSON.stringify(doc));
  doc = JSON.parse(undoStack.pop());
  sel = null; syncFields(); syncUndoBtns(); commit();
}
function redo() {
  if (!redoStack.length) return;
  cancelDraw();
  undoStack.push(JSON.stringify(doc));
  doc = JSON.parse(redoStack.pop());
  sel = null; syncFields(); syncUndoBtns(); commit();
}
function syncUndoBtns() {
  document.getElementById("b-undo").disabled = !undoStack.length;
  document.getElementById("b-redo").disabled = !redoStack.length;
}

// ---------- tools / selection ----------
let tool = "select";           // select | draw | carve | pad | start
let sel = null;                // {kind:'poly'|'hole'|'pad'|'start', idx, vert} or {kind:'group', gid}
let multiOn = false;           // select tool: taps collect elements for grouping
let multiSel = [];             // member refs ({kind:'op'|'pad'|'start', idx})
let lockAllOn = false;         // browse mode: everything locked, drags pan
let drawing = null;            // in-progress polygon: [[x,y],...]
let pendingKind = "draw";      // what `drawing` becomes: 'draw' = rock, 'carve' = a cut
let shape = "free";            // draw/carve input: free | rect | circle
let shapeAnchor = null;        // rect/circle tap-tap: the placed corner/centre
let snapOn = true;
let hoverClose = false;        // draw/carve: cursor near the closing vertex

// Finger-friendly sizing: coarse-pointer devices (phones/tablets) get
// bigger drawn handles and close-targets, and TOUCH input additionally gets
// a much larger grab radius per event (see hitTest's r parameter) — a
// fingertip is ~7 mm of screen, not a mouse cursor.
const COARSE = !!(window.matchMedia && matchMedia("(pointer: coarse)").matches);
const HANDLE_PX = COARSE ? 16 : 11, TOUCH_PX = 28, TAP_PX = COARSE ? 9 : 6;
const CLOSE_PX = COARSE ? 22 : 14;
const HANDLE_R = COARSE ? 7 : 5; // drawn half-size of a vertex square

function snap(v) { return snapOn ? Math.round(v / SNAP_STEP) * SNAP_STEP : Math.round(v * 100) / 100; }
function snapPt(p) { return [snap(p[0]), snap(p[1])]; }

const toolBtns = { select: "t-select", draw: "t-draw", carve: "t-carve",
                   pad: "t-pad", start: "t-start" };
function setTool(t) {
  if (t !== tool) cancelDraw();
  tool = t;
  if (t !== "select") { sel = null; multiOn = false; multiSel = []; }
  for (const k in toolBtns)
    document.getElementById(toolBtns[k]).classList.toggle("on", k === t);
  syncContextBtns();
  setHint();
  draw();
}
for (const k in toolBtns)
  document.getElementById(toolBtns[k]).addEventListener("click", () => setTool(k));

// Shape mode applies to DRAW ROCK and CARVE; picking one from another tool
// jumps into DRAW ROCK (the most likely intent).
const shapeBtns = { free: "s-free", rect: "s-rect", circle: "s-circ" };
function setShape(s) {
  shape = s;
  shapeAnchor = null;
  for (const k in shapeBtns)
    document.getElementById(shapeBtns[k]).classList.toggle("on", k === s);
  if (tool !== "draw" && tool !== "carve") setTool("draw");
  else { setHint(); syncContextBtns(); draw(); }
}
for (const k in shapeBtns)
  document.getElementById(shapeBtns[k]).addEventListener("click", () => setShape(k));

function setHint() {
  const shapeHints = {
    rect: "drag corner to corner · or tap two corners",
    circle: "drag outward from the centre · or tap centre, then edge",
  };
  const hints = {
    select: multiOn
      ? "tap elements to add them to the group · GROUP when ready · Esc: done"
      : "tap: select · drag: move · drag empty: pan · wheel/pinch: zoom",
    draw: shape === "free"
      ? "tap: add vertex · drag: freehand · finish on the first vertex · two fingers: pan/zoom"
      : "draw rock — " + shapeHints[shape],
    carve: shape === "free"
      ? "cut a hole: tap vertices or drag freehand · cuts stay editable — select to move/reshape, delete to restore"
      : "cut a hole — " + shapeHints[shape],
    pad: "tap: place a landing pad · drag: pan",
    start: "tap: place the start platform — the level re-centres so it becomes x = 0",
  };
  document.getElementById("hint").textContent = hints[tool];
}

function syncContextBtns() {
  const show = (id, on) =>
    { document.getElementById(id).style.display = on ? "" : "none"; };
  const isGroup = sel && sel.kind === "group";
  const locked = isGroup && groupLocked(sel.gid);
  const single = sel && (sel.kind === "poly" || sel.kind === "hole" ||
                         sel.kind === "pad" || sel.kind === "start");
  show("b-multi", tool === "select" && !lockAllOn);
  document.getElementById("b-multi").classList.toggle("on", multiOn);
  show("b-group", multiOn && multiSel.length >= 2);
  show("b-ungroup", isGroup && !locked && !lockAllOn);
  show("b-lock", !multiOn && !lockAllOn && (isGroup || single));
  document.getElementById("b-lock").textContent = locked ? "UNLOCK" : "LOCK";
  show("b-del", !multiOn && !lockAllOn && (single || (isGroup && !locked)));
  const closeBtn = document.getElementById("b-close");
  show("b-close", drawing && drawing.length >= 3);
  closeBtn.textContent = pendingKind === "carve" ? "APPLY CUT" : "CLOSE POLY";
  show("b-cancel", !!(drawing || shapeAnchor));
}

function cancelDraw() {
  drawing = null;
  shapeAnchor = null;
  hoverClose = false;
  syncContextBtns();
}

// Finish the pending polygon: rock polys get added, carve polys get subtracted.
function finishPending() {
  if (!drawing || drawing.length < 3) return;
  if (pendingKind === "carve") applyCarve();
  else closeDrawing();
}

function closeDrawing() {
  if (!drawing || drawing.length < 3) return;
  pushUndo();
  doc.ops.push({ t: "rock", p: drawing });
  drawing = null; hoverClose = false;
  setTool("select");
  sel = { kind: "poly", idx: doc.ops.length - 1, vert: null };
  syncContextBtns();
  commit();
}

// ---------- polygon geometry (freehand + carve) ----------
function signedArea(poly) {
  let a = 0;
  for (let i = 0; i < poly.length; i++) {
    const p = poly[i], q = poly[(i + 1) % poly.length];
    a += p[0] * q[1] - q[0] * p[1];
  }
  return a / 2;
}
function ensureCCW(poly) {
  return signedArea(poly) < 0 ? poly.slice().reverse() : poly.slice();
}
function round2(v) { const r = Math.round(v * 100) / 100; return r === 0 ? 0 : r; }

// Ramer–Douglas–Peucker: freehand strokes come in as dense pointer samples
// and leave as a sane vertex count (tolerance in metres, zoom-scaled by the
// caller so what you see is what you keep).
function pointSegDist(p, a, b) {
  const ax = b[0] - a[0], ay = b[1] - a[1];
  const l2 = ax * ax + ay * ay;
  if (l2 < 1e-12) return Math.hypot(p[0] - a[0], p[1] - a[1]);
  const t = Math.max(0, Math.min(1, ((p[0] - a[0]) * ax + (p[1] - a[1]) * ay) / l2));
  return Math.hypot(p[0] - (a[0] + t * ax), p[1] - (a[1] + t * ay));
}
function rdp(pts, eps) {
  if (pts.length < 3) return pts.slice();
  const keep = new Array(pts.length).fill(false);
  keep[0] = keep[pts.length - 1] = true;
  const stack = [[0, pts.length - 1]];
  while (stack.length) {
    const [a, b] = stack.pop();
    let maxD = 0, idx = -1;
    for (let i = a + 1; i < b; i++) {
      const d = pointSegDist(pts[i], pts[a], pts[b]);
      if (d > maxD) { maxD = d; idx = i; }
    }
    if (maxD > eps) { keep[idx] = true; stack.push([a, idx], [idx, b]); }
  }
  return pts.filter((_, i) => keep[i]);
}

// Proper segment intersection, endpoints excluded — the carve polygon is
// jittered by ~1 mm before clipping (see applyCarve), so grid-snapped
// vertex-on-edge / collinear degeneracies can't occur in practice.
function segInt(p1, p2, q1, q2) {
  const rx = p2[0] - p1[0], ry = p2[1] - p1[1];
  const sx = q2[0] - q1[0], sy = q2[1] - q1[1];
  const den = rx * sy - ry * sx;
  if (Math.abs(den) < 1e-12) return null;
  const qpx = q1[0] - p1[0], qpy = q1[1] - p1[1];
  const t = (qpx * sy - qpy * sx) / den;
  const u = (qpx * ry - qpy * rx) / den;
  if (t <= 1e-9 || t >= 1 - 1e-9 || u <= 1e-9 || u >= 1 - 1e-9) return null;
  return { t, u, x: p1[0] + t * rx, y: p1[1] + t * ry };
}

// A hole (clip fully inside the subject) makes a donut, which one simple
// polygon can't represent — but the level format doesn't need it to: rock
// is the UNION of the polys and buried edges are harmless (the Hollows
// frame is built exactly that way). So the donut is returned as pieces:
// split the subject with a half-plane rectangle through the hole (a
// boundary-crossing cut -> clean simple pieces), then subtract the hole
// from each piece (now also boundary-crossing). No slit, no rock lost —
// the pieces' coincident edges along the split line are buried between
// rock on both sides.
function holeSplit(S, C) {
  const cxs = C.map(p => p[0]);
  // Any vertical line strictly inside the hole's x-range crosses both the
  // hole and the subject; the jitter keeps it off grid-snapped vertices.
  const cx = (Math.min(...cxs) + Math.max(...cxs)) / 2 + (Math.random() - 0.5) * 0.002;
  const sxs = S.map(p => p[0]), sys = S.map(p => p[1]);
  const x0 = Math.min(...sxs) - 10, x1 = Math.max(...sxs) + 10;
  const y0 = Math.min(...sys) - 10, y1 = Math.max(...sys) + 10;
  const out = [];
  for (const H of [[[cx, y0], [x1, y0], [x1, y1], [cx, y1]],    // right half-plane
                   [[x0, y0], [cx, y0], [cx, y1], [x0, y1]]]) { // left half-plane
    for (const piece of polyDifference(S, H) || []) {
      const cut = polyDifference(piece, C); // C straddles cx, so it crosses
      if (cut === null) out.push(piece);
      else out.push(...cut);
    }
  }
  return out;
}

// subject minus clip (Greiner–Hormann, difference traversal: subject walked
// FORWARD where outside the clip, clip walked BACKWARD where inside the
// subject). Returns null = untouched (disjoint), [] = swallowed, else the
// resulting piece(s) — a boundary-crossing cut can only split, never create
// holes; the hole case is the no-intersection branch (holeSplit above).
function polyDifference(subjectPts, clipPts) {
  const S = ensureCCW(subjectPts), C = ensureCCW(clipPts);
  const inters = [];
  for (let i = 0; i < S.length; i++) {
    for (let j = 0; j < C.length; j++) {
      const r = segInt(S[i], S[(i + 1) % S.length], C[j], C[(j + 1) % C.length]);
      if (r) inters.push({ i, j, t: r.t, u: r.u, x: r.x, y: r.y });
    }
  }
  if (!inters.length) {
    if (pointInPoly(C[0], S)) return holeSplit(S, C);
    if (pointInPoly(S[0], C)) return [];
    return null;
  }
  // Build circular doubly-linked rings with the intersections spliced in
  // (sorted along each edge) and cross-linked between the rings.
  const mkRing = pts => {
    const nodes = pts.map(p => ({ x: p[0], y: p[1], inter: false }));
    return nodes;
  };
  const sn = mkRing(S), cn = mkRing(C);
  const sIns = new Map(), cIns = new Map(); // edge idx -> [{alpha, node}]
  for (const it of inters) {
    const a = { x: it.x, y: it.y, inter: true, visited: false };
    const b = { x: it.x, y: it.y, inter: true, visited: false };
    a.neighbor = b; b.neighbor = a;
    (sIns.get(it.i) || sIns.set(it.i, []).get(it.i)).push({ alpha: it.t, node: a });
    (cIns.get(it.j) || cIns.set(it.j, []).get(it.j)).push({ alpha: it.u, node: b });
  }
  const splice = (ring, insMap) => {
    const out = [];
    for (let i = 0; i < ring.length; i++) {
      out.push(ring[i]);
      const ins = insMap.get(i);
      if (ins) { ins.sort((p, q) => p.alpha - q.alpha); ins.forEach(e => out.push(e.node)); }
    }
    for (let i = 0; i < out.length; i++) {
      out[i].next = out[(i + 1) % out.length];
      out[i].prev = out[(i - 1 + out.length) % out.length];
    }
    return out;
  };
  const sRing = splice(sn, sIns), cRing = splice(cn, cIns);
  // entry/exit flags: walk each ring, toggling containment in the OTHER poly.
  const mark = (ring, other) => {
    let inside = pointInPoly([ring[0].x, ring[0].y], other);
    for (const n of ring) if (n.inter) { n.entry = !inside; inside = !inside; }
  };
  mark(sRing, C);
  mark(cRing, S);
  // Trace: each result contour starts at a subject EXIT (leaving the clip).
  const results = [];
  for (const start of sRing) {
    if (!start.inter || start.entry || start.visited) continue;
    const contour = [];
    let cur = start, onSubject = true;
    for (let guard = 0; guard < 100000; guard++) {
      let n = cur;
      do {
        contour.push([n.x, n.y]);
        if (n.inter) n.visited = true;
        n = onSubject ? n.next : n.prev;
      } while (!n.inter);
      n.visited = true;
      cur = n.neighbor; onSubject = !onSubject;
      if (cur === start) break;
    }
    // Dedupe near-coincident consecutive points, drop slivers.
    const clean = contour.filter((p, i) => {
      const q = contour[(i + 1) % contour.length];
      return Math.hypot(p[0] - q[0], p[1] - q[1]) > 1e-4;
    }).map(p => [round2(p[0]), round2(p[1])]);
    if (clean.length >= 3 && Math.abs(signedArea(clean)) > 0.02) results.push(clean);
  }
  return results;
}

// A finished carve becomes a persistent HOLE object, not a destructive
// split: it keeps cutting whatever rock it overlaps as it (or the rock) is
// later moved/reshaped. Baking into plain polygons happens in
// compiledPolys at export/test-fly.
function applyCarve() {
  if (!drawing || drawing.length < 3) return;
  pushUndo();
  doc.ops.push({ t: "cut", p: drawing.slice() });
  cancelDraw();
  // Finishing hands over to SELECT with the fresh cut selected — ready to
  // nudge it (same convention as closing a rock polygon).
  setTool("select");
  sel = { kind: "hole", idx: doc.ops.length - 1, vert: null };
  syncContextBtns();
  commit();
}

// rect/circle shapes (the RECT/CIRC modes of DRAW ROCK and CARVE): built
// from an anchor (first corner / centre) + a second point, polygonized so
// the rest of the pipeline sees an ordinary polygon.
function makeShapePoly(a, b) {
  if (shape === "rect") {
    const q = snapPt(b);
    if (Math.abs(q[0] - a[0]) < 0.2 || Math.abs(q[1] - a[1]) < 0.2) return null;
    return [[a[0], a[1]], [q[0], a[1]], [q[0], q[1]], [a[0], q[1]]];
  }
  let r = Math.hypot(b[0] - a[0], b[1] - a[1]);
  r = snapOn ? Math.max(SNAP_STEP, Math.round(r / SNAP_STEP) * SNAP_STEP)
             : Math.round(r * 100) / 100;
  if (r < 0.3) return null;
  const n = Math.max(12, Math.min(48, Math.round(2 * Math.PI * r / 1.2)));
  const out = [];
  for (let i = 0; i < n; i++) {
    const t = i / n * 2 * Math.PI;
    out.push([round2(a[0] + Math.cos(t) * r), round2(a[1] + Math.sin(t) * r)]);
  }
  return out;
}
function commitShapePoly(poly) {
  pushUndo();
  const isCarve = tool === "carve";
  doc.ops.push({ t: isCarve ? "cut" : "rock", p: poly });
  shapeAnchor = null;
  setTool("select");
  sel = { kind: isCarve ? "hole" : "poly", idx: doc.ops.length - 1, vert: null };
  syncContextBtns();
  commit();
}

// The start pad IS the origin: the sim always spawns at x = 0 (SPAWN_X), so
// instead of moving the spawn, moving/placing the start platform re-anchors
// the WHOLE level around it — every x shifts so start.x becomes 0. The view
// shifts by the same amount, so on screen only the grid moves, not the rock.
function reoriginToStart() {
  if (!doc.start) return;
  const dx = doc.start[0];
  if (Math.abs(dx) < 1e-9) return;
  doc.ops.forEach(o => o.p.forEach(p => { p[0] = round2(p[0] - dx); }));
  doc.pads.forEach(p => { p[0] = round2(p[0] - dx); });
  doc.start[0] = 0;
  view.x -= dx;
}

function deleteSelected() {
  if (!sel || lockAllOn) return;
  if (sel.kind === "group") {
    if (groupLocked(sel.gid)) return; // unlock first
    pushUndo();
    const ms = groupMembers(sel.gid);
    ms.filter(m => m.kind === "op").map(m => m.idx).sort((a, b) => b - a)
      .forEach(i => doc.ops.splice(i, 1));
    ms.filter(m => m.kind === "pad").map(m => m.idx).sort((a, b) => b - a)
      .forEach(i => doc.pads.splice(i, 1));
    if (ms.some(m => m.kind === "start")) doc.start = null;
    delete doc.groups[sel.gid];
    sel = null;
    syncContextBtns();
    commit();
    return;
  }
  pushUndo();
  if (sel.kind === "poly" || sel.kind === "hole") {
    const p = doc.ops[sel.idx].p;
    if (sel.vert != null && p.length > 3) {
      p.splice(sel.vert, 1);
      sel.vert = null;
    } else {
      doc.ops.splice(sel.idx, 1); // deleting a cut restores the rock below it
      sel = null;
    }
  } else if (sel.kind === "pad") {
    doc.pads.splice(sel.idx, 1); sel = null;
  } else if (sel.kind === "start") {
    doc.start = null; sel = null;
  }
  syncContextBtns();
  commit();
}

// --- group / lock actions ---
document.getElementById("b-multi").addEventListener("click", () => {
  multiOn = !multiOn;
  multiSel = [];
  sel = null;
  setHint(); syncContextBtns(); draw();
});
document.getElementById("b-group").addEventListener("click", () => {
  if (multiSel.length < 2) return;
  pushUndo();
  const gid = nextGid();
  for (const m of multiSel) setElGroup(m, gid);
  doc.groups[gid] = {};
  pruneGroups(); // reassignment may have emptied an older group
  multiOn = false; multiSel = [];
  sel = { kind: "group", gid };
  setHint(); syncContextBtns(); commit();
});
document.getElementById("b-ungroup").addEventListener("click", () => {
  if (!sel || sel.kind !== "group") return;
  pushUndo();
  for (const m of groupMembers(sel.gid)) setElGroup(m, null);
  delete doc.groups[sel.gid];
  sel = null;
  syncContextBtns(); commit();
});
document.getElementById("b-lock").addEventListener("click", () => {
  if (!sel) return;
  pushUndo();
  if (sel.kind === "group") {
    const g = doc.groups[sel.gid] || (doc.groups[sel.gid] = {});
    g.lk = !g.lk;
  } else {
    // Locking a lone element wraps it in a group of one.
    const m = hitToMember(sel);
    if (!m) { undoStack.pop(); syncUndoBtns(); return; }
    const gid = nextGid();
    setElGroup(m, gid);
    doc.groups[gid] = { lk: true };
    sel = { kind: "group", gid };
  }
  syncContextBtns(); commit();
});

document.getElementById("b-del").addEventListener("click", deleteSelected);
document.getElementById("b-close").addEventListener("click", finishPending);
document.getElementById("b-cancel").addEventListener("click", () => { cancelDraw(); draw(); });
document.getElementById("b-undo").addEventListener("click", undo);
document.getElementById("b-redo").addEventListener("click", redo);
document.getElementById("b-snap").addEventListener("click", e => {
  snapOn = !snapOn;
  e.currentTarget.style.opacity = snapOn ? "" : "0.45";
});
document.getElementById("b-gamezoom").addEventListener("click", () => {
  // The zoom the GAME will use on this device, in CSS px per metre (the
  // editor's drawing space) — mirrors main.rs view_scale: small screens
  // (min CSS dimension < 600) fit MOBILE_VIEW_M = 19 m across the smaller
  // dimension, capped at the desktop scale; desktop is SCALE = 80 physical
  // px/m, which is a dpr-independent 80 CSS px/m. Uses the WINDOW size —
  // the game canvas is the full viewport, not the editor's canvas area.
  const minCss = Math.min(window.innerWidth, window.innerHeight);
  view.s = minCss < 600 ? Math.min(minCss / 19, 80) : 80;
  draw();
});
document.getElementById("b-lockall").addEventListener("click", e => {
  // Browse mode: every element behaves locked — taps still select (for a
  // look at what things are), but drags pan, and nothing can be moved,
  // vertex-edited or deleted. For flying-eye tours of a finished level.
  lockAllOn = !lockAllOn;
  e.currentTarget.classList.toggle("on", lockAllOn);
  syncContextBtns();
  toast(lockAllOn ? "Everything locked — drag anywhere to pan" : "Editing re-enabled");
  draw();
});

// ---------- hit testing ----------
function distPx(ax, ay, bx, by) { return Math.hypot(ax - bx, ay - by); }
function pointInPoly(p, poly) {
  let inside = false;
  const n = poly.length;
  for (let i = 0; i < n; i++) {
    const a = poly[i], b = poly[(i + 1) % n];
    if ((a[1] > p[1]) !== (b[1] > p[1]) &&
        p[0] < (b[0] - a[0]) * (p[1] - a[1]) / (b[1] - a[1]) + a[0]) {
      inside = !inside;
    }
  }
  return inside;
}
// Rock is the ordered op stack, NEWEST WINS: the last op containing a
// point decides — rock op = solid, cut op = open. So rock drawn inside a
// carving is an island; a cut through that island opens it again. Every op
// stays an editable object; the stack is only baked into plain polygons at
// export/test-fly time by compiledPolys, so the game's format is untouched.
function pointInRock(p) {
  for (let i = doc.ops.length - 1; i >= 0; i--) {
    const o = doc.ops[i];
    if (o.p.length >= 3 && pointInPoly(p, o.p)) return o.t === "rock";
  }
  return false;
}
// The exported rock: fold the stack in order — rock ops append, cut ops
// subtract from everything accumulated SO FAR (splitting into simple
// pieces via polyDifference/holeSplit); rock appended later is untouched by
// earlier cuts, which is exactly the newest-wins rule. Each cut gets ~1 mm
// jitter per compile so grid-snapped vertex-on-edge/collinear degeneracies
// can't occur (invisible next to the 1 cm export rounding).
function compiledPolys() {
  let polys = [];
  for (const op of doc.ops) {
    if (op.p.length < 3) continue;
    if (op.t === "rock") { polys.push(op.p.map(q => [q[0], q[1]])); continue; }
    const clip = op.p.map(p => [p[0] + (Math.random() - 0.5) * 0.002,
                                p[1] + (Math.random() - 0.5) * 0.002]);
    if (Math.abs(signedArea(clip)) < 0.02) continue;
    polys = polys.flatMap(p => {
      const r = polyDifference(p, clip);
      return r === null ? [p] : r;
    });
  }
  return polys;
}

// What is under screen point (sx, sy)?
// Priority: selected op's vertices > its edge midpoints (insert) >
// pads/start markers > op bodies, NEWEST FIRST (matching the newest-wins
// rock rule: tapping open space inside a cut selects the cut, tapping a
// rock island on top of it selects the island).
function opPoly(i) { const o = doc.ops[i]; return o && o.p; }
// `r` = grab radius (touch input passes a finger-sized one). With a big
// radius several handles can be in range, so the NEAREST one wins —
// vertices first, then midpoints (a circle's vertices sit ~1.2 m apart, so
// first-match order would routinely grab the wrong one on a phone).
function hitTest(sx, sy, r = HANDLE_PX) {
  if (sel && (sel.kind === "poly" || sel.kind === "hole")) {
    const poly = opPoly(sel.idx);
    if (poly) {
      let best = null, bd = r;
      for (let i = 0; i < poly.length; i++) {
        const d = distPx(sx, sy, w2sx(poly[i][0]), w2sy(poly[i][1]));
        if (d < bd) { bd = d; best = { kind: "vert", of: sel.kind, idx: sel.idx, vert: i }; }
      }
      if (best) return best;
      bd = r * 0.85;
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i], b = poly[(i + 1) % poly.length];
        const d = distPx(sx, sy, w2sx((a[0] + b[0]) / 2), w2sy((a[1] + b[1]) / 2));
        if (d < bd) { bd = d; best = { kind: "mid", of: sel.kind, idx: sel.idx, vert: i + 1 }; }
      }
      if (best) return best;
    }
  }
  for (let i = doc.pads.length - 1; i >= 0; i--) {
    const p = doc.pads[i];
    if (Math.abs(sx - w2sx(p[0])) < Math.max(r, PAD_HALF_W * view.s) &&
        Math.abs(sy - w2sy(p[1])) < r + 4)
      return { kind: "pad", idx: i };
  }
  if (doc.start) {
    const p = doc.start;
    if (Math.abs(sx - w2sx(p[0])) < Math.max(r, PAD_HALF_W * view.s) &&
        Math.abs(sy - w2sy(p[1])) < r + 4)
      return { kind: "start" };
  }
  const wp = [s2wx(sx), s2wy(sy)];
  for (let i = doc.ops.length - 1; i >= 0; i--) {
    const o = doc.ops[i];
    if (o.p.length >= 3 && pointInPoly(wp, o.p))
      return { kind: o.t === "cut" ? "hole" : "poly", idx: i };
  }
  return null;
}

// ---------- pointer input ----------
// One pointer drives the active tool; a second finger always turns the
// gesture into pan/zoom (pinch), whatever the tool. Vertices are committed
// on tap-UP so a drag can stay a pan without side effects.
const pointers = new Map(); // pointerId -> {sx, sy}
let gesture = null; // {type:'pan'|'pinch'|'drag-vert'|'drag-pad'|'drag-start'|'drag-poly'|'maybe-tap', ...}

cv.addEventListener("pointerdown", e => {
  e.preventDefault();
  cv.setPointerCapture(e.pointerId);
  const r = cv.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  pointers.set(e.pointerId, { sx, sy });

  if (pointers.size === 2) {
    // Second finger: abandon whatever the first was doing, become a pinch.
    const [a, b] = [...pointers.values()];
    gesture = { type: "pinch",
                d0: distPx(a.sx, a.sy, b.sx, b.sy),
                cx0: (a.sx + b.sx) / 2, cy0: (a.sy + b.sy) / 2,
                view0: { ...view } };
    return;
  }
  if (pointers.size > 2) return;

  // Middle mouse button = pan, always.
  if (e.button === 1) { gesture = { type: "pan", sx, sy, view0: { ...view } }; return; }

  if (tool === "select") {
    const hit = hitTest(sx, sy, e.pointerType === "touch" ? TOUCH_PX : HANDLE_PX);
    if (lockAllOn) {
      // Browse mode: taps select (element, or its group) for inspection;
      // any drag is a pan. No handle grabs, no moves.
      const m = hitToMember(hit);
      if (m) {
        const gid = elGroupOf(m);
        sel = gid != null ? { kind: "group", gid }
                          : { kind: hit.kind, idx: hit.idx, vert: null };
      }
      gesture = { type: "maybe-tap", sx, sy, view0: { ...view }, deselect: !hit };
      syncContextBtns();
      draw();
      return;
    }
    if (multiOn) {
      // Collecting members for a group: taps toggle on pointer-UP, a drag
      // pans — no selection or dragging of elements in this mode.
      gesture = { type: "maybe-tap", sx, sy, view0: { ...view },
                  multiHit: hitToMember(hit) };
      return;
    }
    // The transform grips win over everything else near the bbox corners.
    const si = selScaleInfo();
    if (si) {
      const grabR = e.pointerType === "touch" ? TOUCH_PX : HANDLE_PX;
      const hsx = w2sx(si.hx) + SCALE_HANDLE_OFF, hsy = w2sy(si.hy) + SCALE_HANDLE_OFF;
      if (distPx(sx, sy, hsx, hsy) < grabR) {
        pushUndo();
        gesture = { type: "drag-scale", cx: si.cx, cy: si.cy, moved: false,
                    d0: Math.max(12, distPx(sx, sy, w2sx(si.cx), w2sy(si.cy))),
                    snap0: scaleSnapshot() };
        return;
      }
      const rsx = w2sx(si.hx) + SCALE_HANDLE_OFF, rsy = w2sy(si.ty) - SCALE_HANDLE_OFF;
      if (distPx(sx, sy, rsx, rsy) < grabR) {
        pushUndo();
        gesture = { type: "drag-rotate", cx: si.cx, cy: si.cy, moved: false,
                    a0: Math.atan2(s2wy(sy) - si.cy, s2wx(sx) - si.cx),
                    snap0: scaleSnapshot() };
        return;
      }
    }
    const member = hitToMember(hit);
    const gid = member && elGroupOf(member);
    if (gid != null) {
      // Grouped element: the tap selects (and a drag moves) the WHOLE
      // group, keeping every member's relative position. Locked groups
      // select but never drag.
      sel = { kind: "group", gid };
      if (groupLocked(gid)) {
        gesture = { type: "maybe-tap", sx, sy, view0: { ...view } };
      } else {
        const ms = groupMembers(gid);
        gesture = { type: "drag-group", gid, sx, sy, undoPushed: false,
          ops0: ms.filter(m => m.kind === "op")
                  .map(m => [m.idx, doc.ops[m.idx].p.map(q => [...q])]),
          pads0: ms.filter(m => m.kind === "pad")
                   .map(m => [m.idx, [...doc.pads[m.idx]]]),
          start0: ms.some(m => m.kind === "start") ? [...doc.start] : null };
      }
      syncContextBtns();
      draw();
      return;
    }
    if (hit && (hit.kind === "vert" || hit.kind === "mid")) {
      pushUndo();
      if (hit.kind === "mid") { // insert a vertex on the edge, then drag it
        const wp = snapPt([s2wx(sx), s2wy(sy)]);
        opPoly(hit.idx).splice(hit.vert, 0, wp);
      }
      sel = { kind: hit.of, idx: hit.idx, vert: hit.vert };
      gesture = { type: "drag-vert", of: hit.of, idx: hit.idx, vert: hit.vert, moved: hit.kind === "mid" };
    } else if (hit && hit.kind === "pad") {
      sel = { kind: "pad", idx: hit.idx };
      gesture = { type: "drag-pad", idx: hit.idx, sx, sy, p0: [...doc.pads[hit.idx]], undoPushed: false };
    } else if (hit && hit.kind === "start") {
      sel = { kind: "start" };
      gesture = { type: "drag-start", sx, sy, p0: [...doc.start], undoPushed: false };
    } else if (hit && (hit.kind === "poly" || hit.kind === "hole")) {
      sel = { kind: hit.kind, idx: hit.idx, vert: null };
      gesture = { type: "drag-poly", of: hit.kind, idx: hit.idx, sx, sy,
                  p0: opPoly(hit.idx).map(p => [...p]), undoPushed: false };
    } else {
      gesture = { type: "maybe-tap", sx, sy, view0: { ...view }, deselect: true };
    }
    syncContextBtns();
    draw();
  } else {
    // draw / carve / pad / start: tap acts on UP; a drag becomes a freehand
    // stroke (draw/carve) or a pan (pad/start).
    gesture = { type: "maybe-tap", sx, sy, view0: { ...view } };
  }
});

cv.addEventListener("pointermove", e => {
  const r = cv.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const info = pointers.get(e.pointerId);

  if (!info) { // hover (mouse, no button): coords + draw-tool close indicator
    updateCoords(sx, sy);
    if (drawing && drawing.length >= 3) {
      const was = hoverClose;
      hoverClose = distPx(sx, sy, w2sx(drawing[0][0]), w2sy(drawing[0][1])) < CLOSE_PX;
      if (was !== hoverClose) draw();
    }
    if (drawing || shapeAnchor) { drawCursor = [s2wx(sx), s2wy(sy)]; draw(); }
    return;
  }
  info.sx = sx; info.sy = sy;
  updateCoords(sx, sy);
  if (!gesture) return;

  if (gesture.type === "pinch") {
    if (pointers.size < 2) return;
    const [a, b] = [...pointers.values()];
    const d = distPx(a.sx, a.sy, b.sx, b.sy);
    const cx = (a.sx + b.sx) / 2, cy = (a.sy + b.sy) / 2;
    const v0 = gesture.view0;
    const s = Math.max(0.5, Math.min(400, v0.s * (d / Math.max(20, gesture.d0))));
    // Keep the world point under the pinch centre anchored.
    const wx = (gesture.cx0 - W / 2) / v0.s + v0.x;
    const wy = (H / 2 - gesture.cy0) / v0.s + v0.y;
    view.s = s;
    view.x = wx - (cx - W / 2) / s;
    view.y = wy + (cy - H / 2) / s;
    draw();
    return;
  }

  if (gesture.type === "maybe-tap" &&
      distPx(sx, sy, gesture.sx, gesture.sy) > TAP_PX) {
    if ((tool === "draw" || tool === "carve") && shape !== "free") {
      // Rect/circle: the drag is a rubber band from the (snapped) press
      // point. A pending tap-tap anchor is superseded by the drag.
      shapeAnchor = null;
      gesture = { type: "shape",
                  a: snapPt([s2wx(gesture.sx), s2wy(gesture.sy)]),
                  b: [s2wx(sx), s2wy(sy)] };
    } else if (tool === "draw" || tool === "carve") {
      // Freehand: the drag IS the stroke (pan with two fingers / middle
      // mouse / wheel). Sampled points get RDP-simplified on release.
      if (!drawing) { drawing = []; pendingKind = tool; }
      gesture = { type: "stroke",
                  pts: [[s2wx(gesture.sx), s2wy(gesture.sy)]],
                  lenPx: 0, lastSx: gesture.sx, lastSy: gesture.sy };
    } else {
      gesture = { type: "pan", sx: gesture.sx, sy: gesture.sy, view0: gesture.view0 };
    }
  }

  switch (gesture.type) {
    case "drag-scale": {
      // Uniform scale about the bbox centre: factor = cursor distance from
      // the centre vs where the grab started. Vertices land on the 1 cm
      // export grid (0.5 m snap would visibly distort small shapes); pad /
      // start POSITIONS scale, their deck width is fixed by the game.
      const f = Math.max(0.05,
        distPx(sx, sy, w2sx(gesture.cx), w2sy(gesture.cy)) / gesture.d0);
      if (Math.abs(f - 1) > 0.002) gesture.moved = true;
      const S = q => [round2(gesture.cx + (q[0] - gesture.cx) * f),
                      round2(gesture.cy + (q[1] - gesture.cy) * f)];
      const keepG2 = (q, p0) => { if (p0.length > 2) q[2] = p0[2]; return q; };
      for (const [i, p0] of gesture.snap0.ops) doc.ops[i].p = p0.map(S);
      for (const [i, p0] of gesture.snap0.pads) doc.pads[i] = keepG2(S(p0), p0);
      if (gesture.snap0.start) doc.start = keepG2(S(gesture.snap0.start), gesture.snap0.start);
      document.getElementById("hint").textContent = "scale × " + f.toFixed(2);
      draw();
      break;
    }
    case "drag-rotate": {
      // Rotate about the bbox centre by the angle the cursor has swept
      // around it since the grab. Grid snap ON snaps the angle to 15°
      // steps (vertex-level snapping would distort the shape); vertices
      // land on the 1 cm export grid like scaling.
      let th = Math.atan2(s2wy(sy) - gesture.cy, s2wx(sx) - gesture.cx) - gesture.a0;
      if (snapOn) th = Math.round(th / (Math.PI / 12)) * (Math.PI / 12);
      if (Math.abs(th) > 0.005) gesture.moved = true;
      const co = Math.cos(th), si2 = Math.sin(th);
      const R = q => {
        const dx = q[0] - gesture.cx, dy = q[1] - gesture.cy;
        return [round2(gesture.cx + dx * co - dy * si2),
                round2(gesture.cy + dx * si2 + dy * co)];
      };
      const keepG3 = (q, p0) => { if (p0.length > 2) q[2] = p0[2]; return q; };
      for (const [i, p0] of gesture.snap0.ops) doc.ops[i].p = p0.map(R);
      for (const [i, p0] of gesture.snap0.pads) doc.pads[i] = keepG3(R(p0), p0);
      if (gesture.snap0.start) doc.start = keepG3(R(gesture.snap0.start), gesture.snap0.start);
      document.getElementById("hint").textContent =
        "rotate " + Math.round(th * 180 / Math.PI) + "°";
      draw();
      break;
    }
    case "shape": {
      gesture.b = [s2wx(sx), s2wy(sy)];
      draw();
      break;
    }
    case "stroke": {
      const last = gesture.pts[gesture.pts.length - 1];
      const wp = [s2wx(sx), s2wy(sy)];
      if (Math.hypot(wp[0] - last[0], wp[1] - last[1]) * view.s > 2) {
        gesture.pts.push(wp);
        gesture.lenPx += distPx(sx, sy, gesture.lastSx, gesture.lastSy);
        gesture.lastSx = sx; gesture.lastSy = sy;
        draw();
      }
      break;
    }
    case "pan": {
      view.x = gesture.view0.x - (sx - gesture.sx) / view.s;
      view.y = gesture.view0.y + (sy - gesture.sy) / view.s;
      draw();
      break;
    }
    case "drag-vert": {
      gesture.moved = true;
      opPoly(gesture.idx)[gesture.vert] = snapPt([s2wx(sx), s2wy(sy)]);
      draw();
      break;
    }
    case "drag-pad": case "drag-start": case "drag-poly": case "drag-group": {
      const dx = (sx - gesture.sx) / view.s, dy = -(sy - gesture.sy) / view.s;
      if (Math.hypot(dx, dy) * view.s < TAP_PX && !gesture.undoPushed) break;
      if (!gesture.undoPushed) { pushUndo(); gesture.undoPushed = true; }
      // Whole-object moves use the SNAPPED delta so shapes (and a group's
      // relative layout) are preserved exactly.
      const sdx = snap(dx), sdy = snap(dy);
      const keepG = (q, p0) => { if (p0.length > 2) q[2] = p0[2]; return q; };
      if (gesture.type === "drag-pad")
        doc.pads[gesture.idx] =
          keepG(snapPt([gesture.p0[0] + dx, gesture.p0[1] + dy]), gesture.p0);
      else if (gesture.type === "drag-start")
        doc.start =
          keepG(snapPt([gesture.p0[0] + dx, gesture.p0[1] + dy]), gesture.p0);
      else if (gesture.type === "drag-poly")
        doc.ops[gesture.idx].p = gesture.p0.map(p => [p[0] + sdx, p[1] + sdy]);
      else {
        for (const [i, p0] of gesture.ops0)
          doc.ops[i].p = p0.map(p => [p[0] + sdx, p[1] + sdy]);
        for (const [i, p0] of gesture.pads0)
          doc.pads[i] = keepG([p0[0] + sdx, p0[1] + sdy], p0);
        if (gesture.start0)
          doc.start = keepG([gesture.start0[0] + sdx, gesture.start0[1] + sdy],
                            gesture.start0);
      }
      draw();
      break;
    }
  }
});

function endPointer(e) {
  const wasGesture = gesture;
  const r = cv.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  pointers.delete(e.pointerId);

  if (wasGesture && wasGesture.type === "pinch") {
    if (pointers.size === 0) gesture = null;
    return; // remaining finger (if any) keeps the view where the pinch left it
  }
  if (pointers.size > 0) return;
  gesture = null;
  if (!wasGesture) return;

  if (wasGesture.type === "shape") {
    const poly = makeShapePoly(wasGesture.a, [s2wx(sx), s2wy(sy)]);
    if (poly) commitShapePoly(poly);
    else { syncContextBtns(); draw(); } // too small: treat as a fizzle
    return;
  }

  if (wasGesture.type === "stroke") {
    // Simplify the sampled stroke to a sane vertex count (tolerance follows
    // the zoom: ~2.5 px of deviation, clamped to 5–60 cm in the world) and
    // append it to the pending polygon. Freehand points deliberately skip
    // grid snap — snapping a curve flattens it.
    const tol = Math.min(0.6, Math.max(0.05, 2.5 / view.s));
    const simp = rdp(wasGesture.pts, tol);
    for (const p of simp) {
      const last = drawing[drawing.length - 1];
      const q = [round2(p[0]), round2(p[1])];
      if (!last || Math.hypot(q[0] - last[0], q[1] - last[1]) > 0.03) drawing.push(q);
    }
    syncContextBtns();
    // A long stroke that ends back at the polygon's first vertex finishes
    // it (draw: add the rock; carve: apply the cut) — one-gesture blobs.
    if (drawing.length > 3 && wasGesture.lenPx > CLOSE_PX * 3) {
      const p0 = drawing[0], pe = drawing[drawing.length - 1];
      if (distPx(w2sx(pe[0]), w2sy(pe[1]), w2sx(p0[0]), w2sy(p0[1])) < CLOSE_PX * 1.5) {
        drawing.pop(); // the tail point sits on the start — drop it
        finishPending();
        return;
      }
    }
    draw();
    return;
  }

  if (wasGesture.type === "maybe-tap") {
    // A clean tap: act per tool.
    if (tool === "select") {
      if (multiOn) {
        const m = wasGesture.multiHit;
        if (m) { // toggle membership in the pending group
          const key = JSON.stringify(m);
          const i = multiSel.findIndex(x => JSON.stringify(x) === key);
          if (i >= 0) multiSel.splice(i, 1); else multiSel.push(m);
          syncContextBtns(); draw();
        }
      } else if (wasGesture.deselect) { sel = null; syncContextBtns(); draw(); }
    } else if ((tool === "draw" || tool === "carve") && shape !== "free") {
      // Tap-tap shapes: first tap anchors the corner/centre, second commits.
      const p = snapPt([s2wx(sx), s2wy(sy)]);
      if (!shapeAnchor) {
        shapeAnchor = p;
        drawCursor = null;
        syncContextBtns();
        draw();
      } else {
        const poly = makeShapePoly(shapeAnchor, p);
        shapeAnchor = null;
        if (poly) commitShapePoly(poly);
        else { syncContextBtns(); draw(); }
      }
    } else if (tool === "draw" || tool === "carve") {
      if (drawing && drawing.length >= 3 &&
          distPx(sx, sy, w2sx(drawing[0][0]), w2sy(drawing[0][1])) < CLOSE_PX) {
        finishPending();
      } else {
        if (!drawing) { drawing = []; pendingKind = tool; }
        drawing.push(snapPt([s2wx(sx), s2wy(sy)]));
        drawCursor = null;
        syncContextBtns();
        draw();
      }
    } else if (tool === "pad") {
      if (doc.pads.length >= MAX_PADS) { toast("Pad limit reached (" + MAX_PADS + ")"); return; }
      pushUndo();
      doc.pads.push(snapPt([s2wx(sx), s2wy(sy)]));
      setTool("select");
      sel = { kind: "pad", idx: doc.pads.length - 1 };
      syncContextBtns();
      commit();
    } else if (tool === "start") {
      pushUndo();
      doc.start = snapPt([s2wx(sx), s2wy(sy)]);
      reoriginToStart(); // the start pad becomes the new x = 0
      setTool("select");
      sel = { kind: "start" };
      syncContextBtns();
      commit();
    }
    return;
  }

  // A drag ended: commit its result.
  if (wasGesture.type === "drag-vert") {
    if (!wasGesture.moved) {
      // It was a tap on a vertex: just select it (undo entry already pushed —
      // drop it, nothing changed).
      undoStack.pop(); syncUndoBtns();
      sel = { kind: wasGesture.of, idx: wasGesture.idx, vert: wasGesture.vert };
      syncContextBtns(); draw();
      return;
    }
    commit();
  } else if (wasGesture.type === "drag-scale" || wasGesture.type === "drag-rotate") {
    setHint(); // clear the live factor/angle readout
    if (!wasGesture.moved) { undoStack.pop(); syncUndoBtns(); draw(); return; }
    // Transforming about the bbox centre can move a grouped start pad off x = 0.
    if (wasGesture.snap0.start) reoriginToStart();
    commit();
  } else if (wasGesture.undoPushed) {
    // Moving the start pad (alone or inside a group) re-anchors the level.
    if (wasGesture.type === "drag-start" ||
        (wasGesture.type === "drag-group" && wasGesture.start0)) reoriginToStart();
    commit();
  }
}
cv.addEventListener("pointerup", endPointer);
cv.addEventListener("pointercancel", endPointer);

// Wheel zoom about the cursor.
cv.addEventListener("wheel", e => {
  e.preventDefault();
  const r = cv.getBoundingClientRect();
  const sx = e.clientX - r.left, sy = e.clientY - r.top;
  const wx = s2wx(sx), wy = s2wy(sy);
  view.s = Math.max(0.5, Math.min(400, view.s * Math.pow(1.0015, -e.deltaY)));
  view.x = wx - (sx - W / 2) / view.s;
  view.y = wy + (sy - H / 2) / view.s;
  draw();
}, { passive: false });

let drawCursor = null; // world pos of the pending draw-tool segment preview

function updateCoords(sx, sy) {
  document.getElementById("coords").textContent =
    s2wx(sx).toFixed(1) + ", " + s2wy(sy).toFixed(1) + " m";
}

// ---------- keyboard ----------
window.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" ||
      e.target.tagName === "SELECT") return;
  const mod = e.ctrlKey || e.metaKey;
  if (mod && e.key.toLowerCase() === "z") { e.preventDefault(); e.shiftKey ? redo() : undo(); }
  else if (mod && e.key.toLowerCase() === "y") { e.preventDefault(); redo(); }
  else if (e.key === "Escape") {
    if (modalOpen()) closeModal();
    else if (drawing || shapeAnchor) { cancelDraw(); draw(); }
    else if (multiOn) { multiOn = false; multiSel = []; setHint(); syncContextBtns(); draw(); }
    else { sel = null; syncContextBtns(); draw(); }
  } else if (e.key === "Enter" && drawing) finishPending();
  else if ((e.key === "Delete" || e.key === "Backspace")) {
    if (drawing) { drawing.pop(); if (!drawing.length) cancelDraw(); syncContextBtns(); draw(); }
    else deleteSelected();
  }
  else if (e.key === "1") setTool("select");
  else if (e.key === "2") setTool("draw");
  else if (e.key === "3") setTool("carve");
  else if (e.key === "4") setTool("pad");
  else if (e.key === "5") setTool("start");
});

// ---------- name / scoring fields ----------
const nameEl = document.getElementById("name");
const scoringEl = document.getElementById("scoring");
function syncFields() { nameEl.value = doc.name; scoringEl.value = doc.scoring; }
nameEl.addEventListener("change", () => { pushUndo(); doc.name = nameEl.value.trim() || "My Level"; commit(); });
scoringEl.addEventListener("change", () => { pushUndo(); doc.scoring = scoringEl.value; commit(); });

// ---------- rendering ----------
function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = "#06080d";
  ctx.fillRect(0, 0, W, H);

  // Grid: pick a step that lands >= 26 px apart on screen.
  const steps = [0.5, 1, 2, 5, 10, 20, 50, 100];
  const step = steps.find(s => s * view.s >= 26) || 200;
  const x0 = Math.floor(s2wx(0) / step) * step, x1 = s2wx(W);
  const y0 = Math.floor(s2wy(H) / step) * step, y1 = s2wy(0);
  ctx.lineWidth = 1;
  ctx.font = "10px ui-monospace, monospace";
  for (let x = x0; x <= x1; x += step) {
    const sx = Math.round(w2sx(x)) + 0.5;
    ctx.strokeStyle = Math.abs(x) < 1e-9 ? "rgba(70,240,255,0.35)" : "rgba(60,80,110,0.18)";
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
    if (step * view.s >= 44) {
      ctx.fillStyle = "rgba(122,134,153,0.6)";
      ctx.fillText(String(Math.round(x * 10) / 10), sx + 3, H - 6);
    }
  }
  for (let y = y0; y <= y1; y += step) {
    const sy = Math.round(w2sy(y)) + 0.5;
    ctx.strokeStyle = Math.abs(y) < 1e-9 ? "rgba(70,240,255,0.35)" : "rgba(60,80,110,0.18)";
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
    if (step * view.s >= 44) {
      ctx.fillStyle = "rgba(122,134,153,0.6)";
      ctx.fillText(String(Math.round(y * 10) / 10), 4, sy - 3);
    }
  }

  // Rock (the game's slate palette): source fills composited on an
  // offscreen layer so holes ERASE them (destination-out) without touching
  // the grid beneath — the on-canvas result is the COMPILED rock.
  const tracePoly = (c, poly) => {
    c.beginPath();
    poly.forEach((p, j) => j ? c.lineTo(w2sx(p[0]), w2sy(p[1]))
                             : c.moveTo(w2sx(p[0]), w2sy(p[1])));
    c.closePath();
  };
  if (rockLayer.width !== cv.width || rockLayer.height !== cv.height) {
    rockLayer.width = cv.width; rockLayer.height = cv.height;
  }
  const rctx = rockLayer.getContext("2d");
  rctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  rctx.clearRect(0, 0, W, H);
  // Ops composite IN ORDER — rock paints, a cut erases what's below it, and
  // rock painted after a cut lands on top: the canvas shows exactly the
  // newest-wins rule the export compiles.
  for (const o of doc.ops) {
    if (o.p.length < 3) continue;
    if (o.t === "cut") {
      rctx.globalCompositeOperation = "destination-out";
      rctx.fillStyle = "#000";
    } else {
      rctx.globalCompositeOperation = "source-over";
      rctx.fillStyle = "rgba(52,68,96,0.5)";
    }
    tracePoly(rctx, o.p);
    rctx.fill();
  }
  rctx.globalCompositeOperation = "source-over";
  ctx.drawImage(rockLayer, 0, 0, W, H);

  // Outlines: stroke only stretches that are real compiled boundary — open
  // space in front, rock still behind. That skips buried overlap/seam edges
  // AND edge stretches a hole has eaten; a hole's own boundary strokes
  // where it actually cuts rock (it IS the chamber wall there).
  ctx.strokeStyle = "#5c7496";
  ctx.lineWidth = 1.25;
  ctx.beginPath();
  const strokeExposed = poly => {
    const ccw = signedArea(poly) > 0; // y-up: interior left of edge dir
    for (let k = 0; k < poly.length; k++) {
      const a = poly[k], b = poly[(k + 1) % poly.length];
      const ex = b[0] - a[0], ey = b[1] - a[1];
      const len = Math.hypot(ex, ey);
      if (len < 1e-6) continue;
      const ox = (ccw ? ey : -ey) / len * 0.06, oy = (ccw ? -ex : ex) / len * 0.06;
      const steps = Math.max(1, Math.ceil(len / 2)); // ~2 m grain, like the game
      for (let s = 0; s < steps; s++) {
        const mx = a[0] + ex * (s + 0.5) / steps, my = a[1] + ey * (s + 0.5) / steps;
        // A stretch is a real wall exactly where the two sides DISAGREE
        // about being rock — that covers every stacking case: buried
        // seams, edges swallowed by a later cut, a cut's boundary re-rocked
        // by an island on top, all skip; true rock/open transitions stroke.
        if (pointInRock([mx + ox, my + oy]) === pointInRock([mx - ox, my - oy])) continue;
        const t0 = s / steps, t1 = (s + 1) / steps;
        ctx.moveTo(w2sx(a[0] + ex * t0), w2sy(a[1] + ey * t0));
        ctx.lineTo(w2sx(a[0] + ex * t1), w2sy(a[1] + ey * t1));
      }
    }
  };
  doc.ops.forEach((o, i) => {
    if (o.p.length >= 3 && !(sel && sel.idx === i &&
        (sel.kind === "poly" || sel.kind === "hole"))) strokeExposed(o.p);
  });
  ctx.stroke();

  // Cut guides: dashed outline so a cut stays visible/selectable even over
  // open space (faint) — the selected one bright, its handles drawn below.
  doc.ops.forEach((o, i) => {
    if (o.t !== "cut" || o.p.length < 2) return;
    const isSel = sel && sel.kind === "hole" && sel.idx === i;
    ctx.strokeStyle = isSel ? "#ff5d5d" : "rgba(255,93,93,0.3)";
    ctx.lineWidth = isSel ? 2 : 1;
    ctx.setLineDash([5, 4]);
    tracePoly(ctx, o.p);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Selected op: full outline (rock only — a selected cut's bright dashed
  // guide is above) + vertex and midpoint handles.
  if (sel && (sel.kind === "poly" || sel.kind === "hole") && opPoly(sel.idx)) {
    const poly = opPoly(sel.idx);
    if (sel.kind === "poly") {
      ctx.strokeStyle = "#46f0ff";
      ctx.lineWidth = 2;
      tracePoly(ctx, poly);
      ctx.stroke();
    }
    if (!lockAllOn) { // browse mode: outline only, no edit handles
      for (let i = 0; i < poly.length; i++) {
        const a = poly[i], b = poly[(i + 1) % poly.length];
        const mx = w2sx((a[0] + b[0]) / 2), my = w2sy((a[1] + b[1]) / 2);
        ctx.fillStyle = "rgba(70,240,255,0.35)";
        ctx.beginPath(); ctx.arc(mx, my, HANDLE_R - 1, 0, 7); ctx.fill();
      }
      poly.forEach((p, i) => {
        const x = w2sx(p[0]), y = w2sy(p[1]);
        ctx.fillStyle = sel.vert === i ? "#ffb545" : "#46f0ff";
        ctx.fillRect(x - HANDLE_R, y - HANDLE_R, HANDLE_R * 2, HANDLE_R * 2);
        ctx.strokeStyle = "#06080d"; ctx.lineWidth = 1.5;
        ctx.strokeRect(x - HANDLE_R, y - HANDLE_R, HANDLE_R * 2, HANDLE_R * 2);
      });
    }
  }

  // Multi-select collection + group selection: dashed outlines per member,
  // and for a selected group a bounding box (with a LOCKED badge).
  const memberOutline = (m, color) => {
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    if (m.kind === "op" && doc.ops[m.idx]) {
      tracePoly(ctx, doc.ops[m.idx].p);
      ctx.stroke();
    } else {
      const p = m.kind === "pad" ? doc.pads[m.idx] : doc.start;
      if (p) {
        const hw = PAD_HALF_W * view.s;
        ctx.strokeRect(w2sx(p[0]) - hw - 6, w2sy(p[1]) - 12, hw * 2 + 12, 32);
      }
    }
    ctx.setLineDash([]);
  };
  multiSel.forEach(m => memberOutline(m, "#57ff9a"));
  if (sel && sel.kind === "group") {
    const ms = groupMembers(sel.gid);
    ms.forEach(m => memberOutline(m, "#46f0ff"));
    let lo = [Infinity, Infinity], hi = [-Infinity, -Infinity];
    const eat = p => { lo = [Math.min(lo[0], p[0]), Math.min(lo[1], p[1])];
                       hi = [Math.max(hi[0], p[0]), Math.max(hi[1], p[1])]; };
    ms.forEach(m => {
      if (m.kind === "op") doc.ops[m.idx].p.forEach(eat);
      else eat(m.kind === "pad" ? doc.pads[m.idx] : doc.start);
    });
    if (lo[0] <= hi[0]) {
      const x0 = w2sx(lo[0]) - 14, y0 = w2sy(hi[1]) - 14;
      const bw = w2sx(hi[0]) - w2sx(lo[0]) + 28, bh = w2sy(lo[1]) - w2sy(hi[1]) + 28;
      ctx.strokeStyle = "rgba(70,240,255,0.55)";
      ctx.lineWidth = 1.5;
      ctx.setLineDash([3, 5]);
      ctx.strokeRect(x0, y0, bw, bh);
      ctx.setLineDash([]);
      const lk = groupLocked(sel.gid) || lockAllOn;
      ctx.fillStyle = lk ? "#ffb545" : "rgba(70,240,255,0.8)";
      ctx.font = "11px ui-monospace, monospace";
      ctx.fillText(lk ? "\u{1F512} LOCKED GROUP" : "GROUP", x0 + 2, y0 - 6);
    }
  }

  // Transform grips (see selScaleInfo): SCALE at the bbox's bottom-right
  // corner, ROTATE at the top-right — both about the bbox centre.
  const si = selScaleInfo();
  if (si) {
    const grip = (gx, gy) => {
      ctx.fillStyle = "#ffb545";
      ctx.beginPath();
      ctx.arc(gx, gy, HANDLE_R + 2, 0, 7);
      ctx.fill();
      ctx.strokeStyle = "#06080d";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    };
    const a = HANDLE_R - 1.5;
    // Scale: diagonal double-arrow.
    const hx = w2sx(si.hx) + SCALE_HANDLE_OFF, hy = w2sy(si.hy) + SCALE_HANDLE_OFF;
    grip(hx, hy);
    ctx.beginPath();
    ctx.moveTo(hx - a, hy - a); ctx.lineTo(hx + a, hy + a);
    ctx.moveTo(hx - a, hy - a); ctx.lineTo(hx - a + 3, hy - a);
    ctx.moveTo(hx - a, hy - a); ctx.lineTo(hx - a, hy - a + 3);
    ctx.moveTo(hx + a, hy + a); ctx.lineTo(hx + a - 3, hy + a);
    ctx.moveTo(hx + a, hy + a); ctx.lineTo(hx + a, hy + a - 3);
    ctx.stroke();
    // Rotate: open arc with an arrowhead.
    const rx = w2sx(si.hx) + SCALE_HANDLE_OFF, ry = w2sy(si.ty) - SCALE_HANDLE_OFF;
    grip(rx, ry);
    ctx.beginPath();
    ctx.arc(rx, ry, a, -0.4 * Math.PI, 0.9 * Math.PI);
    ctx.stroke();
    ctx.beginPath();
    const tx = rx + a * Math.cos(-0.4 * Math.PI), tyy = ry + a * Math.sin(-0.4 * Math.PI);
    ctx.moveTo(tx, tyy); ctx.lineTo(tx - 3, tyy - 1);
    ctx.moveTo(tx, tyy); ctx.lineTo(tx + 1, tyy - 3.5);
    ctx.stroke();
  }

  // In-progress polygon (amber = rock being drawn, red = a cut being carved),
  // plus the live freehand stroke while a drag is in flight.
  if (drawing && (drawing.length || (gesture && gesture.type === "stroke"))) {
    const col = pendingKind === "carve" ? "#ff5d5d" : "#ffb545";
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    let first = true;
    const seg = p => {
      if (first) { ctx.moveTo(w2sx(p[0]), w2sy(p[1])); first = false; }
      else ctx.lineTo(w2sx(p[0]), w2sy(p[1]));
    };
    drawing.forEach(seg);
    if (gesture && gesture.type === "stroke") gesture.pts.forEach(seg);
    else if (drawCursor) seg(drawCursor);
    ctx.stroke();
    ctx.setLineDash([]);
    drawing.forEach((p, j) => {
      ctx.fillStyle = j === 0 && hoverClose ? "#57ff9a" : col;
      ctx.beginPath();
      ctx.arc(w2sx(p[0]), w2sy(p[1]), j === 0 ? HANDLE_R + 2 : HANDLE_R - 1, 0, 7);
      ctx.fill();
    });
  }

  // Rect/circle preview: rubber band while dragging, or anchored after the
  // first tap-tap corner/centre (drawCursor follows the hover).
  let shapePrev = null;
  if (gesture && gesture.type === "shape") shapePrev = [gesture.a, gesture.b];
  else if (shapeAnchor) shapePrev = [shapeAnchor, drawCursor];
  if (shapePrev) {
    const col = tool === "carve" ? "#ff5d5d" : "#ffb545";
    if (shapePrev[1]) {
      const poly = makeShapePoly(shapePrev[0], shapePrev[1]);
      if (poly) {
        ctx.strokeStyle = col;
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 5]);
        tracePoly(ctx, poly);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.arc(w2sx(shapePrev[0][0]), w2sy(shapePrev[0][1]), 5, 0, 7);
    ctx.fill();
  }

  // Pads and the start platform: a deck line with legs, like the game.
  const deck = (p, color, label, isSel) => {
    const x = w2sx(p[0]), y = w2sy(p[1]);
    const hw = PAD_HALF_W * view.s;
    ctx.strokeStyle = color; ctx.lineWidth = isSel ? 4 : 3;
    ctx.beginPath(); ctx.moveTo(x - hw, y); ctx.lineTo(x + hw, y); ctx.stroke();
    ctx.lineWidth = 1.5;
    const leg = Math.min(10, 0.7 * view.s);
    [[-0.6, 0], [0.6, 0]].forEach(o => {
      ctx.beginPath();
      ctx.moveTo(x + o[0] * hw, y); ctx.lineTo(x + o[0] * hw, y + leg);
      ctx.stroke();
    });
    ctx.fillStyle = color;
    ctx.font = "11px ui-monospace, monospace";
    ctx.textAlign = "center";
    ctx.fillText(label, x, y + leg + 12);
    ctx.textAlign = "left";
    if (isSel) {
      ctx.strokeStyle = "#46f0ff"; ctx.setLineDash([4, 4]);
      ctx.strokeRect(x - hw - 5, y - 10, hw * 2 + 10, leg + 18);
      ctx.setLineDash([]);
    }
  };
  doc.pads.forEach((p, i) =>
    deck(p, "#57ff9a", "P" + (i + 1), sel && sel.kind === "pad" && sel.idx === i));
  if (doc.start)
    deck(doc.start, "#8fa0b5", "START", sel && sel.kind === "start");

  // Spawn marker: the REAL ship at its true world size (SHIP_GLYPH — the
  // hero-SVG vector ship, ~1.43 m tall incl. the in-game 1.5× render scale,
  // feet 0.73 below the spawn origin exactly like stand_y places them), so
  // tunnel and pad clearances can be judged directly while drawing. The sim
  // spawns at x = 0, and the editor keeps the start platform AT x = 0 by
  // re-anchoring the level around it (reoriginToStart) — so the marker
  // rides the start pad, staying truthful even mid-drag. Tinted red when
  // buried in rock; at far zoom-out a faint ring keeps the true-size (tiny)
  // ship findable instead of inflating it.
  const ground = doc.start ? doc.start[1] : (doc.spawnY ?? 0);
  const spawn = [doc.start ? doc.start[0] : 0, ground + 0.78];
  const buried = pointInRock(spawn);
  const shipPx = 1.43 * view.s;
  if (shipPx >= 7) {
    for (const [fill, pp] of SHIP_GLYPH) {
      ctx.fillStyle = buried ? "rgba(255,93,93,0.85)" : fill;
      ctx.beginPath();
      for (let i = 0; i < pp.length; i += 2) {
        const X = w2sx(spawn[0] + pp[i]), Y = w2sy(spawn[1] + pp[i + 1]);
        i ? ctx.lineTo(X, Y) : ctx.moveTo(X, Y);
      }
      ctx.closePath();
      ctx.fill();
    }
  }
  if (shipPx < 16) {
    ctx.strokeStyle = buried ? "rgba(255,93,93,0.7)" : "rgba(255,89,200,0.6)";
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(w2sx(spawn[0]), w2sy(spawn[1]), 9, 0, 7);
    ctx.stroke();
  }

  // Scale bar (bottom right).
  const bar = steps.find(s => s * view.s >= 60) || 200;
  const bw = bar * view.s;
  ctx.strokeStyle = "rgba(122,134,153,0.8)"; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W - 14 - bw, H - 16); ctx.lineTo(W - 14, H - 16);
  ctx.stroke();
  ctx.fillStyle = "rgba(122,134,153,0.9)";
  ctx.font = "11px ui-monospace, monospace";
  ctx.textAlign = "right";
  ctx.fillText(bar + " m", W - 14, H - 22);
  ctx.textAlign = "left";
}

// ---------- validation ----------
// A JS port of the checks the game's geometry-lint tests do with
// Terrain::point_in_rock, plus the backend verifier's terrain caps.
function polyArea(poly) {
  let a = 0;
  for (let i = 0; i < poly.length; i++) {
    const p = poly[i], q = poly[(i + 1) % poly.length];
    a += p[0] * q[1] - q[0] * p[1];
  }
  return Math.abs(a) / 2;
}
function clearAbove(p, what, out) {
  // The deck point and a ship-sized pocket above it must be open space.
  const probes = [[0, 0.4], [0, 1.2], [0, 2.0], [-1.2, 1.0], [1.2, 1.0]];
  if (probes.some(o => pointInRock([p[0] + o[0], p[1] + o[1]])))
    out.push({ level: "error", msg: what + " has rock in the landing pocket above it" });
}
function validate() {
  const out = [];
  // Caps are checked on the COMPILED geometry — holes split polys into
  // pieces, so the exported counts are what the verifier will see.
  const compiled = compiledPolys();
  if (!compiled.length)
    out.push({ level: "error", msg: "No rock left — draw a polygon (or delete a hole)" });
  if (compiled.length > MAX_POLYS)
    out.push({ level: "error", msg: "Too many polygons after carving (" + compiled.length + " > " + MAX_POLYS + ", the score-verifier cap)" });
  const verts = compiled.reduce((n, p) => n + p.length, 0);
  if (verts > MAX_VERTS)
    out.push({ level: "error", msg: "Too many vertices (" + verts + " > " + MAX_VERTS + ", the score-verifier cap)" });
  if (doc.pads.length > MAX_PADS)
    out.push({ level: "error", msg: "Too many pads (" + doc.pads.length + " > " + MAX_PADS + ", the score-verifier cap)" });
  doc.ops.forEach((o, i) => {
    if (o.p.length >= 3 && polyArea(o.p) < 0.25)
      out.push({ level: "warn", msg: (o.t === "cut" ? "Cut " : "Polygon ") + (i + 1) + " is degenerate (near-zero area)" });
  });
  const ground = doc.start ? doc.start[1] : (doc.spawnY ?? 0);
  const spawn = [doc.start ? doc.start[0] : 0, ground + 0.78];
  if (pointInRock(spawn) || pointInRock([spawn[0], spawn[1] + 1.2]))
    out.push({ level: "error", msg: "The spawn point (x = " + spawn[0].toFixed(1) + ", y = " + spawn[1].toFixed(1) + ") is inside rock — clear it or move the start platform" });
  if (!doc.start)
    out.push({ level: "warn", msg: "No start platform — the ship will spawn standing at x = 0, ground y = " + ground.toFixed(1) });
  doc.pads.forEach((p, i) => {
    if (pointInRock([p[0], p[1] + 0.05]))
      out.push({ level: "error", msg: "Pad " + (i + 1) + " deck is inside rock" });
    else clearAbove(p, "Pad " + (i + 1), out);
  });
  if (doc.start) clearAbove(doc.start, "The start platform", out);
  if (doc.scoring === "time" && !doc.pads.length)
    out.push({ level: "error", msg: "Time scoring needs at least one pad to visit" });
  return out;
}
function refreshIssues() {
  const issues = validate();
  const el = document.getElementById("issues");
  const errs = issues.filter(i => i.level === "error").length;
  if (!issues.length) { el.style.display = "none"; return; }
  el.style.display = "";
  el.classList.toggle("err", errs > 0);
  el.textContent = "⚠ " + issues.length + " issue" + (issues.length > 1 ? "s" : "");
  el.onclick = () => showValidation(issues);
}

// ---------- export / import ----------
function fmtN(v) {
  const r = Math.round(v * 100) / 100;
  return String(r === 0 ? 0 : r);
}
function levelText() {
  const L = [];
  L.push("# Made with the Pegasus level editor (editor.html)");
  L.push("name = " + doc.name.replace(/[\r\n]/g, " ").trim());
  L.push("scoring = " + doc.scoring);
  L.push("shafts = off");
  L.push("obstacles = off");
  L.push("");
  if (doc.start) L.push("start = " + fmtN(doc.start[0]) + "," + fmtN(doc.start[1]));
  else if (doc.spawnY != null) L.push("spawn_y = " + fmtN(doc.spawnY));
  for (const p of doc.pads) L.push("pad = " + fmtN(p[0]) + "," + fmtN(p[1]));
  if (doc.start || doc.spawnY != null || doc.pads.length) L.push("");
  // The game gets plain polygons: holes baked in as split pieces.
  for (const poly of compiledPolys())
    L.push("poly = " + poly.map(p => fmtN(p[0]) + "," + fmtN(p[1])).join(" "));
  // The full editor document (incl. still-editable holes) rides along as a
  // comment — the game's parser ignores it, IMPORT restores it losslessly.
  L.push("");
  L.push("# editor-doc: " + JSON.stringify(doc));
  return L.join("\n") + "\n";
}
// Parse the hand-drawn subset of the `.level` format (mirrors Level::parse:
// `key = value` lines, # comments, unknown keys ignored). Files this editor
// exported carry the full document in an `# editor-doc:` comment — prefer
// it, so holes come back as editable objects instead of baked pieces.
function parseLevelText(text) {
  const dm = text.match(/^# editor-doc: (.+)$/m);
  if (dm) {
    try {
      const d = JSON.parse(dm[1]);
      if (d && ((Array.isArray(d.ops) && d.ops.length)
                || (Array.isArray(d.polys) && d.polys.length))) return d;
    } catch (e) { /* corrupt comment: fall through to the line parser */ }
  }
  const d = { name: "Imported level", scoring: "time", polys: [], pads: [], start: null, spawnY: null };
  const pt = s => {
    const m = s.split(",");
    if (m.length !== 2) return null;
    const x = parseFloat(m[0]), y = parseFloat(m[1]);
    return isFinite(x) && isFinite(y) ? [x, y] : null;
  };
  for (let line of text.split(/\r?\n/)) {
    line = line.trim();
    if (!line || line.startsWith("#")) continue;
    const i = line.indexOf("=");
    if (i < 0) continue;
    const k = line.slice(0, i).trim(), v = line.slice(i + 1).trim();
    if (k === "name") d.name = v;
    else if (k === "scoring" && ["time", "pads", "distance"].includes(v.toLowerCase()))
      d.scoring = v.toLowerCase();
    else if (k === "poly") {
      const p = v.split(/\s+/).map(pt).filter(Boolean);
      if (p.length >= 3) d.polys.push(p);
    } else if (k === "pad") { const p = pt(v); if (p) d.pads.push(p); }
    else if (k === "start") d.start = pt(v);
    else if (k === "spawn_y") { const f = parseFloat(v); if (isFinite(f)) d.spawnY = f; }
  }
  return d.polys.length ? d : null;
}

// ---------- modal ----------
const modal = document.getElementById("modal");
const mtitle = document.getElementById("mtitle");
const mtext = document.getElementById("mtext");
const mlist = document.getElementById("mlist");
const mrow = document.getElementById("mrow");
function modalOpen() { return modal.classList.contains("on"); }
function closeModal() { modal.classList.remove("on"); }
modal.addEventListener("pointerdown", e => { if (e.target === modal) closeModal(); });
function openModal(title, opts) {
  mtitle.textContent = title;
  mtext.style.display = opts.text != null ? "" : "none";
  mlist.style.display = opts.list ? "" : "none";
  if (opts.text != null) { mtext.value = opts.text; mtext.readOnly = !!opts.readonly; }
  if (opts.list) {
    mlist.textContent = "";
    for (const it of opts.list) {
      const div = document.createElement("div");
      div.className = it.cls;
      div.textContent = it.msg;
      mlist.appendChild(div);
    }
  }
  mrow.textContent = "";
  for (const b of opts.buttons) {
    const btn = document.createElement("button");
    btn.className = "btn" + (b.cls ? " " + b.cls : "");
    btn.textContent = b.label;
    btn.addEventListener("click", b.fn);
    mrow.appendChild(btn);
  }
  modal.classList.add("on");
}

function showValidation(issues) {
  const list = issues.length
    ? issues.map(i => ({ cls: i.level === "error" ? "e" : "w",
                         msg: (i.level === "error" ? "✖ " : "⚠ ") + i.msg }))
    : [{ cls: "ok", msg: "✔ No problems found — good to fly" }];
  openModal("CHECK LEVEL", { list, buttons: [{ label: "Close", fn: closeModal }] });
}

function toast(msg) {
  document.getElementById("hint").textContent = msg;
  setTimeout(setHint, 2500);
}

// File stem for the download: from the level name.
function fileStem() {
  return (doc.name.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "")
          || "custom") + ".level";
}

document.getElementById("b-export").addEventListener("click", () => {
  const text = levelText();
  openModal("EXPORT · " + fileStem(), {
    text, readonly: true,
    buttons: [
      { label: "Copy", fn: () => {
          (navigator.clipboard ? navigator.clipboard.writeText(mtext.value)
                               : Promise.reject()).then(
            () => toast("Copied"),
            () => { mtext.select(); document.execCommand("copy"); toast("Copied"); });
        } },
      { label: "Download", cls: "go", fn: () => {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(new Blob([mtext.value], { type: "text/plain" }));
          a.download = fileStem();
          a.click();
          URL.revokeObjectURL(a.href);
        } },
      { label: "Close", fn: closeModal },
    ],
  });
});

document.getElementById("b-import").addEventListener("click", () => {
  openModal("IMPORT · paste .level text", {
    text: "",
    buttons: [
      { label: "Load", cls: "go", fn: () => {
          const d = parseLevelText(mtext.value);
          if (!d) { toast("No poly lines found — not a hand-drawn level"); return; }
          pushUndo();
          doc = normalizeDoc(d);
          reoriginToStart(); // imported levels obey the start-pad-origin rule too
          sel = null; cancelDraw();
          syncFields(); fitView(); closeModal(); commit();
        } },
      { label: "Cancel", fn: closeModal },
    ],
  });
  mtext.readOnly = false;
  mtext.focus();
});

document.getElementById("b-new").addEventListener("click", () => {
  openModal("NEW LEVEL", {
    list: [{ cls: "w", msg: "Replace the current drawing with the starter room? (Undo can bring it back.)" }],
    buttons: [
      { label: "Replace", cls: "danger", fn: () => {
          pushUndo();
          doc = starterDoc();
          sel = null; cancelDraw();
          syncFields(); fitView(); closeModal(); commit();
        } },
      { label: "Cancel", fn: closeModal },
    ],
  });
});

document.getElementById("b-fly").addEventListener("click", () => {
  const issues = validate();
  const errs = issues.filter(i => i.level === "error");
  const go = () => {
    try { localStorage.setItem(CUSTOM_KEY, levelText()); }
    catch (e) { toast("Couldn't save the level (storage full?)"); return; }
    location.href = "./?custom=1";
  };
  if (errs.length) {
    openModal("PROBLEMS FOUND", {
      list: issues.map(i => ({ cls: i.level === "error" ? "e" : "w",
                               msg: (i.level === "error" ? "✖ " : "⚠ ") + i.msg })),
      buttons: [
        { label: "Fly anyway", cls: "warn", fn: go },
        { label: "Back to editing", cls: "go", fn: closeModal },
      ],
    });
  } else {
    go();
  }
});

// ---------- boot ----------
syncFields();
setHint();
syncUndoBtns();
resize();
reoriginToStart(); // pre-rule autosaves may carry an off-origin start pad
fitView();
refreshIssues();
draw();
</script>
</body>
</html>
